<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海報投票彙整(唯讀)— Zodiac Ops</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
  .wrap{max-width:840px;margin:0 auto;padding:28px 18px 60px;}
  .wrap.embed{padding:12px 12px 20px;}
  .head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:8px;}
  h1{font-size:20px;font-weight:800;color:#f8fafc;}
  .sub{font-size:12px;color:#64748b;margin-bottom:4px;}
  .ro-tag{font-size:10px;font-weight:700;color:#4ade80;background:#064e3b;border:1px solid #22c55e;border-radius:6px;padding:2px 8px;}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:16px 0 16px;}
  .session-input{background:#0f172a;border:2px solid #334155;border-radius:10px;padding:8px 12px;color:#f8fafc;font-family:monospace;font-size:14px;outline:none;width:200px;}
  .session-input:focus{border-color:#3b82f6;}
  .btn{border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn.blue{background:#3b82f6;color:#fff;} .btn.blue:hover{background:#2563eb;}
  .btn.ghost{background:#1e293b;border:1px solid #334155;color:#94a3b8;} .btn.ghost:hover{border-color:#60a5fa;color:#60a5fa;}
  .stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .stat{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 18px;}
  .stat .v{font-size:24px;font-weight:800;color:#60a5fa;} .stat .l{font-size:11px;color:#64748b;}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#4ade80;}
  .live .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  /* tabs */
  .tabbar{display:flex;gap:0;background:#0c1625;border:1px solid #1e293b;border-radius:12px;overflow:hidden;margin-bottom:18px;}
  .tabbar button{flex:1;border:none;background:transparent;color:#64748b;padding:10px 6px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,color .15s;}
  .tabbar button:hover{color:#e2e8f0;background:#1e293b;}
  .tabbar button.active{background:#1e293b;color:#60a5fa;border-bottom:2px solid #3b82f6;}
  .tabbar .badge{font-size:10px;background:#334155;border-radius:10px;padding:1px 6px;color:#94a3b8;}
  .tabbar button.active .badge{background:#1e3a5f;color:#60a5fa;}
  .tabbar button.warn .badge{background:#451a03;color:#fb923c;}

  .rank-card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
  .rank-no{font-size:20px;font-weight:900;width:34px;text-align:center;flex-shrink:0;}
  .rank-no.r1{color:#fbbf24;} .rank-no.r2{color:#cbd5e1;} .rank-no.r3{color:#d4a574;}
  .rank-icon{font-size:24px;width:40px;text-align:center;flex-shrink:0;}
  .rank-name{font-weight:700;font-size:16px;color:#f8fafc;flex:1;}
  .rank-name .breakdown{font-size:11px;color:#64748b;font-weight:400;margin-top:2px;}
  .rank-bar-wrap{flex:1;min-width:80px;height:8px;background:#0f172a;border-radius:4px;overflow:hidden;}
  .rank-bar{height:100%;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:4px;transition:width .5s;}
  .rank-pts{font-size:20px;font-weight:800;color:#f59e0b;width:54px;text-align:right;flex-shrink:0;}

  h2{font-size:13px;font-weight:700;color:#64748b;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{color:#64748b;text-align:left;padding:7px 9px;border-bottom:1px solid #334155;font-size:10px;text-transform:uppercase;white-space:nowrap;}
  td{padding:7px 9px;border-bottom:1px solid #1e293b;color:#e2e8f0;}
  td.mono{font-family:monospace;color:#94a3b8;}
  .empty{text-align:center;color:#475569;padding:40px;font-size:14px;}
  .matrix-scroll{overflow-x:auto;border:1px solid #1e293b;border-radius:10px;}
  table.matrix{border-collapse:collapse;font-size:11px;min-width:560px;}
  table.matrix th,table.matrix td{padding:5px 6px;text-align:center;border:1px solid #0f172a;}
  table.matrix thead th{background:#0f172a;color:#60a5fa;position:sticky;top:0;font-size:14px;}
  table.matrix .rowhead{background:#0f172a;color:#cbd5e1;font-weight:700;white-space:nowrap;text-align:left;position:sticky;left:0;font-size:12px;}
  table.matrix td.cell{color:#e2e8f0;font-weight:600;}
  table.matrix td.diag{background:#1e293b;color:#334155;}
  table.matrix td.top{outline:2px solid #f59e0b;border-radius:4px;color:#fbbf24;font-weight:800;}
  table.matrix td.mutual{box-shadow:inset 0 0 0 2px #22c55e;}
  .matrix-note{font-size:11px;color:#475569;margin:0 0 10px;}
  .mutual-sect{margin-top:22px;}
  .err{background:#450a0a;border:1px solid #7f1d1d;color:#f87171;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:16px;}
  .load-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#0c1625;border:1px solid #1e293b;border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:12px;}
  .load-bar button{border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;background:#3b82f6;color:#fff;}
  .load-bar button:disabled{opacity:.5;cursor:not-allowed;}
  .ok-tag{color:#4ade80;font-weight:700;} .err-tag{color:#f87171;font-weight:700;}
  table.lift th,table.lift td{padding:5px 7px;text-align:center;border:1px solid #0f172a;font-size:11px;font-weight:700;}
  table.lift thead th{background:#0c1625;color:#60a5fa;font-size:13px;}
  table.lift .lh{background:#0c1625;color:#cbd5e1;text-align:left;white-space:nowrap;}
  .rank-delta{font-size:11px;font-weight:700;margin-left:4px;}
  .up{color:#4ade80;} .dn{color:#f87171;} .eq{color:#475569;}
</style>
</head>
<body>
<div id="app">
  <div :class="['wrap', embedMode ? 'embed' : '']">
    <div v-if="!embedMode" class="head">
      <div>
        <h1><i class="fa-solid fa-ranking-star" style="color:#f59e0b;margin-right:8px;"></i>海報投票彙整</h1>
        <div class="sub">學生票選 · 第1名 3分 / 第2名 2分 / 第3名 1分</div>
      </div>
      <span class="ro-tag"><i class="fa-solid fa-eye"></i> 唯讀</span>
    </div>

    <div v-if="!embedMode" class="bar">
      <input v-model.trim="sid" class="session-input" placeholder="sessionId" @keyup.enter="connect" />
      <button class="btn blue" @click="connect"><i class="fa-solid fa-plug"></i> 連線</button>
      <button class="btn ghost" @click="exportCSV" :disabled="voteCount===0"><i class="fa-solid fa-file-csv"></i> 匯出 CSV</button>
      <span v-if="connected" class="live"><span class="dot"></span> 即時更新中</span>
    </div>

    <div v-if="err" class="err"><i class="fa-solid fa-triangle-exclamation"></i> {{ err }}</div>

    <!-- Stats always visible -->
    <div v-if="!embedMode" class="stat-row">
      <div class="stat"><div class="v">{{ voteCount }}</div><div class="l">已投票</div></div>
      <div class="stat"><div class="v" style="color:#f87171;">{{ notVoted.length }}</div><div class="l">未投票</div></div>
      <div class="stat"><div class="v" style="color:#fbbf24;">{{ onlineNotVoted }}</div><div class="l">未投・在線</div></div>
      <div class="stat"><div class="v">{{ rosterCount }}</div><div class="l">名單總人</div></div>
      <div class="stat"><div class="v">{{ totalPts }}</div><div class="l">投出總分</div></div>
    </div>

    <!-- Tab bar (hidden in embed mode) -->
    <div v-if="!embedMode" class="tabbar">
      <button :class="{active:tab==='rank'}" @click="tab='rank'">
        <i class="fa-solid fa-trophy"></i> 排名
        <span class="badge">{{ rankedGroups.length }}</span>
      </button>
      <button :class="{active:tab==='flow'}" @click="tab='flow'">
        <i class="fa-solid fa-arrow-right-arrow-left"></i> 流向
        <span class="badge">{{ mutualPairs.length }} 互</span>
      </button>
      <button :class="['', notVoted.length>0&&onlineNotVoted>0?'warn':'', tab==='notvote'?'active':'']" @click="tab='notvote'">
        <i class="fa-solid fa-user-clock"></i> 未投票
        <span class="badge">{{ notVoted.length }}</span>
      </button>
      <button :class="{active:tab==='raw'}" @click="tab='raw'">
        <i class="fa-solid fa-table-list"></i> 明細
        <span class="badge">{{ voteCount }}</span>
      </button>
      <button :class="{active:tab==='impact'}" @click="tab='impact'">
        <i class="fa-solid fa-arrow-trend-up"></i> 影響力
      </button>
      <button :class="{active:tab==='adv'}" @click="openAdvTab()">
        <i class="fa-solid fa-flask"></i> 進階
      </button>
    </div>

    <div v-if="voteCount===0 && connected" class="empty">尚無投票資料</div>

    <!-- Tab: 排名 -->
    <template v-if="tab==='rank'">
      <div v-if="rankedGroups.length===0 && !connected" class="empty">請先連線</div>
      <div v-for="(g, idx) in rankedGroups" :key="g.label" class="rank-card">
        <div :class="['rank-no', idx===0?'r1':idx===1?'r2':idx===2?'r3':'']">{{ idx+1 }}</div>
        <div class="rank-icon">{{ g.icon }}</div>
        <div class="rank-name">
          {{ g.label }}
          <div class="breakdown">🥇{{ g.r1 }} · 🥈{{ g.r2 }} · 🥉{{ g.r3 }}</div>
        </div>
        <div class="rank-bar-wrap"><div class="rank-bar" :style="`width:${g.pts/maxPts*100}%`"></div></div>
        <div class="rank-pts">{{ g.pts }}</div>
      </div>
    </template>

    <!-- Tab: 流向矩陣 + 互投 -->
    <template v-if="tab==='flow'">
      <div v-if="voteCount===0" class="empty">尚無投票資料</div>
      <template v-else>
        <h2>投票流向矩陣</h2>
        <div class="matrix-note">列＝投票組　欄＝被投組　數字＝投出總分(3/2/1)；🟧橘框＝該列投最多的對象；🟩綠框＝互投；灰格＝自己</div>
        <div class="matrix-scroll">
          <table class="matrix">
            <thead>
              <tr>
                <th class="rowhead">投↓ / 被投→</th>
                <th v-for="t in ZODIAC" :key="t.label" :title="t.label">{{ t.icon }}</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="f in ZODIAC" :key="f.label">
                <td class="rowhead">{{ f.icon }} {{ f.label }}</td>
                <td v-for="t in ZODIAC" :key="t.label"
                    :class="['cell', f.label===t.label?'diag':'', rowTops[f.label]===t.label?'top':'', (f.label!==t.label && mutualSet.has(f.label+'|'+t.label))?'mutual':'']"
                    :style="f.label!==t.label && flowMatrix[f.label][t.label]>0
                            ? `background:rgba(59,130,246,${0.12+0.78*flowMatrix[f.label][t.label]/matrixMax})` : ''">
                  {{ f.label===t.label ? '—' : (flowMatrix[f.label][t.label]||'') }}
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="mutual-sect">
          <h2>互投偵測（{{ mutualPairs.length }} 對）</h2>
          <div v-if="mutualPairs.length===0" class="empty" style="padding:20px;">目前無互投組對</div>
          <table v-else>
            <tr><th>組對</th><th>A → B</th><th>B → A</th><th>合計</th></tr>
            <tr v-for="p in mutualPairs" :key="p.a+p.b">
              <td>{{ p.ia }} {{ p.a }} <span style="color:#22c55e;">⇄</span> {{ p.ib }} {{ p.b }}</td>
              <td>{{ p.ab }}</td><td>{{ p.ba }}</td>
              <td><strong style="color:#f59e0b;">{{ p.sum }}</strong></td>
            </tr>
          </table>
        </div>
      </template>
    </template>

    <!-- Tab: 未投票 -->
    <template v-if="tab==='notvote'">
      <h2>尚未投票（{{ notVoted.length }} 人 · 其中 <span style="color:#fbbf24">{{ onlineNotVoted }}</span> 人在線中）</h2>
      <div v-if="notVoted.length===0" class="empty" style="padding:20px;">🎉 全部投完了！</div>
      <table v-else>
        <tr><th>狀態</th><th>學號</th><th>姓名</th><th>組別</th><th>最後連線</th></tr>
        <tr v-for="s in notVoted" :key="s.id">
          <td><span :style="`color:${s.online?'#4ade80':'#475569'}`">●</span> {{ s.online ? '在線' : '離線' }}</td>
          <td class="mono">{{ s.id }}</td>
          <td>{{ s.name }}</td>
          <td>{{ s.zodiac }}</td>
          <td class="mono">{{ s.seen }}</td>
        </tr>
      </table>
    </template>

    <!-- Tab: 影響力 -->
    <template v-if="tab==='impact'">
      <div v-if="voteCount===0" class="empty">尚無投票資料</div>
      <template v-else>

        <!-- 1. Counterfactual: remove each group's votes -->
        <h2>反事實分析：移除某組票後的排名變動</h2>
        <p style="font-size:11px;color:#475569;margin-bottom:10px;">
          依次移除每一組的投票，重算排名。顯示影響最大的組（排名位移最多）。
        </p>
        <table>
          <tr>
            <th>移除組</th><th>該組票數</th><th>最大位移</th><th>排名上升最多</th><th>排名下降最多</th>
          </tr>
          <tr v-for="r in counterfactual" :key="r.removed"
              :style="r.maxDelta>=3?'background:#1a2e1a':r.maxDelta>=2?'background:#1e1e2e':''">
            <td><strong>{{ r.icon }} {{ r.removed }}</strong></td>
            <td style="color:#94a3b8;">{{ r.totalVotes }} 票</td>
            <td style="font-weight:800;" :style="r.maxDelta>=3?'color:#4ade80':r.maxDelta>=2?'color:#f59e0b':'color:#64748b'">
              ± {{ r.maxDelta }} 名
            </td>
            <td style="font-size:11px;">
              <span v-if="r.changes.filter(c=>c.delta>0).length">
                <span v-for="c in r.changes.filter(c=>c.delta>0).slice(0,2)" :key="c.label"
                      style="color:#4ade80;margin-right:6px;">
                  {{ c.label }} ↑{{ c.delta }}
                </span>
              </span>
              <span v-else style="color:#334155;">—</span>
            </td>
            <td style="font-size:11px;">
              <span v-if="r.changes.filter(c=>c.delta<0).length">
                <span v-for="c in r.changes.filter(c=>c.delta<0).slice(0,2)" :key="c.label"
                      style="color:#f87171;margin-right:6px;">
                  {{ c.label }} ↓{{ -c.delta }}
                </span>
              </span>
              <span v-else style="color:#334155;">—</span>
            </td>
          </tr>
        </table>
        <div style="font-size:10px;color:#334155;margin-top:6px;">
          位移 = 原排名 − 新排名；正值 = 該組受益於此來源票（移除後排名下滑）；負值 = 反之。
        </div>

        <!-- 2. Vote concentration (Gini) per source group -->
        <h2 style="margin-top:24px;">投票集中度（各組如何分配票）</h2>
        <p style="font-size:11px;color:#475569;margin-bottom:10px;">
          Gini = 0 → 完全平均分散；Gini → 1 → 所有票集中投給一組。
        </p>
        <table>
          <tr><th>投票組</th><th>總投出分</th><th>最集中投給</th><th>佔比</th><th>Gini 集中度</th><th>風格</th></tr>
          <tr v-for="r in voteConcentration" :key="r.label">
            <td><strong>{{ r.icon }} {{ r.label }}</strong></td>
            <td style="color:#94a3b8;">{{ r.total }}</td>
            <td>{{ r.top }}</td>
            <td>{{ r.topPct }}%</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:80px;height:7px;background:#0f172a;border-radius:4px;overflow:hidden;">
                  <div :style="`width:${r.gini*100}%;height:100%;background:${r.gini>0.6?'#f87171':r.gini>0.35?'#f59e0b':'#4ade80'};border-radius:4px;`"></div>
                </div>
                <span :style="`color:${r.gini>0.6?'#f87171':r.gini>0.35?'#f59e0b':'#4ade80'};font-weight:700;`">
                  {{ r.gini }}
                </span>
              </div>
            </td>
            <td style="font-size:11px;color:#64748b;">
              {{ r.gini>0.6?'高度集中 — 策略型':r.gini>0.35?'中等集中':'平均分散' }}
            </td>
          </tr>
        </table>

        <!-- 3. Normalized contribution matrix -->
        <h2 style="margin-top:24px;">來源貢獻矩陣（佔各組得分的 %）</h2>
        <p style="font-size:11px;color:#475569;margin-bottom:10px;">
          列＝投票組，欄＝被投組，數字＝「該欄組」的總得分中有幾 % 來自「該列組」。
        </p>
        <div class="matrix-scroll">
          <table class="matrix">
            <thead>
              <tr>
                <th class="rowhead">來源↓ / 目標→</th>
                <th v-for="t in ZODIAC" :key="t.label" :title="t.label">{{ t.icon }}</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="f in ZODIAC" :key="f.label">
                <td class="rowhead">{{ f.icon }} {{ f.label }}</td>
                <td v-for="t in ZODIAC" :key="t.label"
                    :class="f.label===t.label?'diag':'cell'"
                    :style="f.label!==t.label && impactMatrix[f.label]?.[t.label]>0
                      ? `background:rgba(250,204,21,${0.05+0.65*(impactMatrix[f.label][t.label]/100)});color:${impactMatrix[f.label][t.label]>40?'#000':'#e2e8f0'}`
                      : ''">
                  {{ f.label===t.label ? '—' : (impactMatrix[f.label]?.[t.label]||'') }}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div style="font-size:10px;color:#334155;margin-top:6px;">
          格值 = 該來源組佔目標組總分的百分比（%）。黃色深淺代表貢獻大小。欄加總 ≈ 100%。
        </div>

      </template>
    </template>

    <!-- Tab: 進階分析 -->
    <template v-if="tab==='adv'">
      <div v-if="voteCount===0" class="empty">請先連線</div>
      <template v-else>

        <!-- Teacher score loader -->
        <div class="load-bar">
          <i class="fa-solid fa-gavel" style="color:#60a5fa;"></i>
          <span style="color:#94a3b8;">合併評審分</span>
          <button @click="loadJudgeScores" :disabled="judgeLoading">
            <i class="fa-solid fa-download"></i> {{ judgeLoading ? '載入中…' : '載入評審分' }}
          </button>
          <span v-if="judgeScores" class="ok-tag"><i class="fa-solid fa-circle-check"></i> 已載入 {{ Object.keys(judgeScores).length }} 組</span>
          <span v-if="judgeErr" class="err-tag">{{ judgeErr }}</span>
        </div>

        <!-- 3-way ranking (only when judge loaded) -->
        <template v-if="judgeScores">
          <h2>三方排名對照（學生 Borda · PageRank · 評審加權）</h2>
          <table style="margin-bottom:20px;">
            <tr>
              <th>組別</th>
              <th style="text-align:right;">Borda 排</th>
              <th style="text-align:right;">PageRank 排</th>
              <th style="text-align:right;">評審排</th>
              <th style="text-align:right;">平均排名</th>
              <th>一致性</th>
            </tr>
            <tr v-for="r in threeWayRanks" :key="r.label">
              <td><strong>{{ r.icon }} {{ r.label }}</strong></td>
              <td style="text-align:right;font-weight:700;">{{ r.borda }}</td>
              <td style="text-align:right;">
                {{ r.pr }}
                <span class="rank-delta" :class="r.pr<r.borda?'up':r.pr>r.borda?'dn':'eq'">
                  {{ r.pr<r.borda?'↑'+(r.borda-r.pr):r.pr>r.borda?'↓'+(r.pr-r.borda):'' }}
                </span>
              </td>
              <td style="text-align:right;">
                {{ r.judge }}
                <span class="rank-delta" :class="r.judge<r.borda?'up':r.judge>r.borda?'dn':'eq'">
                  {{ r.judge<r.borda?'↑'+(r.borda-r.judge):r.judge>r.borda?'↓'+(r.judge-r.borda):'' }}

                <span v-if="r.maxSpread<=1" style="color:#4ade80;font-size:11px;font-weight:700;">一致 ✓</span>
                <span v-else-if="r.maxSpread<=3" style="color:#f59e0b;font-size:11px;">中等</span>

        </template>

        <!-- PageRank -->
        <h2>PageRank（品質加權排名）</h2>
        <p style="font-size:11px;color:#475569;margin-bottom:10px;">
          獲得高人氣組別的投票加分更多。與 Borda 差距越大，表示該組的票「品質」與「數量」不一致。
        </p>
        <table style="margin-bottom:20px;">
          <tr><th>PageRank 排</th><th>組別</th><th style="text-align:right;">PR 分</th><th style="text-align:right;">Borda 排</th><th>位移</th></tr>
          <tr v-for="(r,i) in pageRankRanked" :key="r.label">
            <td style="font-weight:800;font-size:16px;" :style="i===0?'color:#fbbf24':i===1?'color:#cbd5e1':i===2?'color:#d4a574':'color:#475569'">
              {{ i+1 }}
            </td>
            <td><strong>{{ r.icon }} {{ r.label }}</strong></td>
            <td style="text-align:right;font-family:monospace;color:#60a5fa;">{{ r.score }}</td>
            <td style="text-align:right;color:#94a3b8;">{{ r.bordaRank }}</td>
            <td>
              <span v-if="r.delta>0" class="up">↑ {{ r.delta }}</span>
              <span v-else-if="r.delta<0" class="dn">↓ {{ -r.delta }}</span>

        <!-- Lift matrix -->
        <h2>Lift 矩陣（真實偏好強度）</h2>
        <p style="font-size:11px;color:#475569;margin-bottom:10px;">
          lift = 實際票數 ÷ 若完全隨機的期望票數。
          &gt; 2 = 強烈偏好（深綠）；≈ 1 = 符合預期（灰）；&lt; 0.5 = 低於預期（深紅）；空格 = 無投票。
        </p>
        <div class="matrix-scroll">
          <table class="lift">
            <thead>
              <tr>
                <th class="lh">投↓ / 被投→</th>
                <th v-for="t in ZODIAC" :key="t.label" :title="t.label">{{ t.icon }}</th>

            </thead>
            <tbody>
              <tr v-for="f in ZODIAC" :key="f.label">
                <td class="lh">{{ f.icon }} {{ f.label }}</td>
                <td v-for="t in ZODIAC" :key="t.label"
                    :style="f.label===t.label
                      ? 'background:#1e293b;color:#334155;'
                      : liftMatrix[f.label]?.[t.label]>0
                        ? liftCellStyle(liftMatrix[f.label][t.label])
                        : 'background:#0c1625;color:#1e293b;'">
                  {{ f.label===t.label ? '—' : liftMatrix[f.label]?.[t.label]>0 ? liftMatrix[f.label][t.label] : '' }}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div style="font-size:10px;color:#334155;margin-top:6px;display:flex;gap:14px;">
          <span style="color:#4ade80;">■ &gt;2.0 強烈偏好</span>
          <span style="color:#86efac;">■ 1.5–2.0</span>
          <span style="color:#475569;">■ 0.8–1.5 隨機範圍</span>
          <span style="color:#f87171;">■ &lt;0.5 低於預期</span>
        </div>

        <!-- Temporal trajectory -->
        <h2 style="margin-top:24px;">投票時序：排名演變</h2>
        <div v-if="!temporalData" style="color:#475569;font-size:12px;padding:12px 0;">
          投票資料中缺少 submittedAt 時間戳，無法繪製時序圖。
        </div>
        <template v-else>
          <p style="font-size:11px;color:#475569;margin-bottom:10px;">
            依投票送出時間排序，追蹤前 6 組累積票數的演變（越早穩定 = 越早建立領先）。
          </p>
          <canvas id="temporalChart" style="max-height:360px;"></canvas>
        </template>

      </template>
    </template>

    <!-- Tab: 原始明細 -->
    <template v-if="tab==='raw'">
      <h2>原始投票明細（{{ voteCount }} 筆）</h2>
      <div v-if="voteCount===0" class="empty">尚無投票資料</div>
      <table v-else>
        <tr><th>投票者學號</th><th>所屬組</th><th>🥇第1名(+3)</th><th>🥈第2名(+2)</th><th>🥉第3名(+1)</th><th>時間</th></tr>
        <tr v-for="v in rawVotes" :key="v.voter">
          <td class="mono">{{ v.voter }}</td>
          <td>{{ v.voterZodiac||'—' }}</td>
          <td>{{ v.rank1 }}</td>
          <td>{{ v.rank2 }}</td>
          <td>{{ v.rank3 }}</td>
          <td class="mono">{{ v.time }}</td>
        </tr>
      </table>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref as dbRef, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
const { createApp, ref, reactive, computed, watch, nextTick } = Vue;

const GAS_URL    = 'https://script.google.com/macros/s/AKfycbzF6ntS5kGtvbvWeZLWkd_0qdjQnlSLJM0NiLifopAN64OyzSiqqL5ma3bul7quXZ1zGA/exec';
const GAS_SECRET = 'zodiac-2026-cmuh';

function pageRankCalc(flowMatrix, groups, damping=0.85, iters=60) {
  const n=groups.length;
  let pr={};
  groups.forEach(g=>{pr[g]=1/n;});
  for(let it=0;it<iters;it++){
    const np={};
    groups.forEach(t=>{
      let s=0;
      groups.forEach(f=>{
        const out=groups.reduce((a,x)=>a+(flowMatrix[f]?.[x]||0),0);
        if(out>0) s+=pr[f]*(flowMatrix[f]?.[t]||0)/out;
      });
      np[t]=(1-damping)/n+damping*s;
    });
    pr=np;
  }
  return pr;
}

const FIREBASE = {
  apiKey: "AIzaSyBPdK2Ptbc9srt8DY74URKQyNmceexM-ro",
  authDomain: "cmu-11402-pathophysiology.firebaseapp.com",
  databaseURL: "https://cmu-11402-pathophysiology-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cmu-11402-pathophysiology",
  storageBucket: "cmu-11402-pathophysiology.firebasestorage.app",
  messagingSenderId: "367793212618",
  appId: "1:367793212618:web:c11acedc50ce6fc3897833"
};
const ZODIAC = [
  {label:'子鼠',icon:'⚡️'},{label:'丑牛',icon:'🧱'},{label:'寅虎',icon:'🔥'},{label:'卯兔',icon:'🧐'},
  {label:'辰龍',icon:'🌟'},{label:'巳蛇',icon:'🧠'},{label:'午馬',icon:'🚀'},{label:'未羊',icon:'🤝'},
  {label:'申猴',icon:'💡'},{label:'酉雞',icon:'⏱'},{label:'戌狗',icon:'🛡'},{label:'亥豬',icon:'📚'},
];
const ICON = {}; ZODIAC.forEach(z => ICON[z.label]=z.icon);

const app = initializeApp(FIREBASE);
const db = getDatabase(app);
const auth = getAuth(app);

createApp({
  setup() {
    const _p = new URLSearchParams(location.search);
    const sid = ref(_p.get('id') || '20260611-9X9Y');
    const embedMode = ref(_p.get('embed') || '');  // e.g. ?embed=flow → show only flow tab
    const tab = ref(embedMode.value || 'rank');
    const connected = ref(false);
    const err = ref('');
    const votes = ref({});
    const students = ref({});

    const connect = async () => {
      err.value=''; connected.value=false; votes.value={}; students.value={};
      if (!sid.value) { err.value='請輸入 sessionId'; return; }
      try {
        if (!auth.currentUser) await signInAnonymously(auth);
        onValue(dbRef(db, `classrooms/${sid.value}/posterVotes`), snap => {
          votes.value = snap.val() || {};
          connected.value = true;
        }, e => { err.value = '讀取失敗：' + e.message; });
        onValue(dbRef(db, `classrooms/${sid.value}/students`), snap => {
          students.value = snap.val() || {};
        }, e => { err.value = '名單讀取失敗：' + e.message; });
      } catch(e) {
        err.value = '連線/驗證失敗：' + (e.code||e.message) + '（請確認 Anonymous 登入已啟用）';
      }
    };

    const notVoted = computed(() => {
      const voted = new Set(Object.keys(votes.value));
      const now = Date.now();
      return Object.entries(students.value)
        .filter(([id]) => !voted.has(id))
        .map(([id, s]) => {
          const p = s.profile || {};
          return {
            id, name: p.Name||'', zodiac: p.Zodiac||'',
            online: !!(s.lastSeen && (now - s.lastSeen < 40000)),
            seen: s.lastSeen ? new Date(s.lastSeen).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—'
          };
        })
        .sort((a,b) => a.id.localeCompare(b.id));
    });
    const rosterCount = computed(() => Object.keys(students.value).length);
    const onlineNotVoted = computed(() => notVoted.value.filter(s => s.online).length);

    const rawVotes = computed(() => Object.entries(votes.value).map(([voter,v]) => ({
      voter, rank1:v.rank1||'', rank2:v.rank2||'', rank3:v.rank3||'',
      voterZodiac:v.voterZodiac||'',
      time: v.submittedAt ? new Date(v.submittedAt).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''
    })).sort((a,b)=>a.voter.localeCompare(b.voter)));

    const voteCount = computed(() => Object.keys(votes.value).length);

    const tally = computed(() => {
      const t = {};
      Object.values(votes.value).forEach(v => {
        if (v.rank1){ t[v.rank1]=t[v.rank1]||{pts:0,r1:0,r2:0,r3:0}; t[v.rank1].pts+=3; t[v.rank1].r1++; }
        if (v.rank2){ t[v.rank2]=t[v.rank2]||{pts:0,r1:0,r2:0,r3:0}; t[v.rank2].pts+=2; t[v.rank2].r2++; }
        if (v.rank3){ t[v.rank3]=t[v.rank3]||{pts:0,r1:0,r2:0,r3:0}; t[v.rank3].pts+=1; t[v.rank3].r3++; }
      });
      return t;
    });

    const rankedGroups = computed(() =>
      Object.entries(tally.value)
        .map(([label,d]) => ({ label, icon:ICON[label]||'❓', ...d }))
        .sort((a,b)=>b.pts-a.pts)
    );
    const totalPts = computed(() => rankedGroups.value.reduce((s,g)=>s+g.pts,0));
    const maxPts   = computed(() => Math.max(1, ...rankedGroups.value.map(g=>g.pts)));

    const flowMatrix = computed(() => {
      const m = {};
      ZODIAC.forEach(z => { m[z.label]={}; ZODIAC.forEach(t => m[z.label][t.label]=0); });
      Object.values(votes.value).forEach(v => {
        const f = v.voterZodiac; if (!f||!m[f]) return;
        if (v.rank1 && m[f][v.rank1]!==undefined) m[f][v.rank1]+=3;
        if (v.rank2 && m[f][v.rank2]!==undefined) m[f][v.rank2]+=2;
        if (v.rank3 && m[f][v.rank3]!==undefined) m[f][v.rank3]+=1;
      });
      return m;
    });
    const matrixMax = computed(() => {
      let mx=0; Object.values(flowMatrix.value).forEach(r=>Object.values(r).forEach(v=>{if(v>mx)mx=v;}));
      return Math.max(1,mx);
    });
    const rowTops = computed(() => {
      const out={};
      Object.entries(flowMatrix.value).forEach(([f,row])=>{
        let best='',bv=0; Object.entries(row).forEach(([t,v])=>{if(v>bv){bv=v;best=t;}});
        out[f]=bv>0?best:null;
      });
      return out;
    });
    const mutualPairs = computed(() => {
      const m=flowMatrix.value, L=ZODIAC.map(z=>z.label), out=[];
      for (let i=0;i<L.length;i++) for (let j=i+1;j<L.length;j++) {
        const a=L[i], b=L[j], ab=m[a][b]||0, ba=m[b][a]||0;
        if (ab>0 && ba>0) out.push({a,b,ia:ICON[a]||'',ib:ICON[b]||'',ab,ba,sum:ab+ba});
      }
      return out.sort((x,y)=>y.sum-x.sum);
    });
    const mutualSet = computed(() => {
      const s=new Set(); mutualPairs.value.forEach(p=>{s.add(p.a+'|'+p.b);s.add(p.b+'|'+p.a);}); return s;
    });

    // ── Impact tab computeds ─────────────────────────────────────────────
    // Counterfactual: remove each group's votes and recompute ranks
    const counterfactual = computed(() => {
      const allVotes = Object.values(votes.value);
      const baseRanks = {};
      rankedGroups.value.forEach((g,i) => { baseRanks[g.label]=i+1; });

      return ZODIAC.map(removed => {
        const n = allVotes.filter(v=>v.voterZodiac===removed.label).length;
        if (!n) return null;
        const filtered = allVotes.filter(v=>v.voterZodiac!==removed.label);
        const t={};
        filtered.forEach(v=>{
          if(v.rank1){t[v.rank1]=(t[v.rank1]||0)+3;}
          if(v.rank2){t[v.rank2]=(t[v.rank2]||0)+2;}
          if(v.rank3){t[v.rank3]=(t[v.rank3]||0)+1;}
        });
        const newRanks={};
        Object.entries(t).sort((a,b)=>b[1]-a[1]).forEach(([lbl],i)=>{newRanks[lbl]=i+1;});
        const changes = ZODIAC.map(g=>{
          const o=baseRanks[g.label]||99, nw=newRanks[g.label]||99;
          return {label:g.label, old:o, now:nw, delta:o-nw};
        }).filter(c=>c.delta!==0 && c.old<99).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
        const maxDelta = changes.length ? Math.abs(changes[0].delta) : 0;
        const z = ZODIAC.find(z=>z.label===removed.label);
        return {removed:removed.label, icon:z?.icon||'', totalVotes:n, changes, maxDelta};
      }).filter(Boolean).sort((a,b)=>b.maxDelta-a.maxDelta);
    });

    // Vote concentration: Gini coefficient per source group
    const voteConcentration = computed(() => {
      return ZODIAC.map(f => {
        const row = ZODIAC.filter(t=>t.label!==f.label)
                          .map(t=>flowMatrix.value[f.label]?.[t.label]||0);
        const total = row.reduce((a,b)=>a+b,0);
        if (!total) return null;
        const sorted=[...row].sort((a,b)=>a-b), n=sorted.length;
        const gini=+(sorted.reduce((s,v,i)=>s+(2*(i+1)-n-1)*v,0)/(n*total)).toFixed(2);
        const maxVal=Math.max(...row);
        const topIdx=row.indexOf(maxVal);
        const topLabel=ZODIAC.filter(t=>t.label!==f.label)[topIdx]?.label||'—';
        return {label:f.label, icon:f.icon, gini, top:topLabel, topPct:+(maxVal/total*100).toFixed(0), total};
      }).filter(Boolean).sort((a,b)=>b.gini-a.gini);
    });

    // Normalized contribution: % of each target group's score from each source
    const impactMatrix = computed(() => {
      const m=flowMatrix.value;
      const colTotals={};
      ZODIAC.forEach(t=>{
        colTotals[t.label]=ZODIAC.reduce((s,f)=>s+(m[f.label]?.[t.label]||0),0);
      });
      const norm={};
      ZODIAC.forEach(f=>{
        norm[f.label]={};
        ZODIAC.forEach(t=>{
          const total=colTotals[t.label]||1;
          const val=m[f.label]?.[t.label]||0;
          norm[f.label][t.label]=val>0?+((val/total*100).toFixed(0)):0;
        });
      });
      return norm;
    });

    const exportCSV = () => {
      const head = ['排名','組別','總分','第1名票','第2名票','第3名票'];
      const rows = rankedGroups.value.map((g,i)=>[i+1,g.label,g.pts,g.r1,g.r2,g.r3]);
      const sep = '\n';
      const labels = ZODIAC.map(z=>z.label);
      const mtx = [['',''],['投票流向矩陣（列=投票組,欄=被投組,值=投出總分）'],
        ['投↓ / 被投→', ...labels],
        ...labels.map(f => [f, ...labels.map(t => f===t?'':(flowMatrix.value[f][t]||0))])];
      const mut = [['',''],['互投組對'],['A','B','A→B','B→A','合計'],
        ...mutualPairs.value.map(p=>[p.a,p.b,p.ab,p.ba,p.sum])];
      const nv = [['',''],['尚未投票('+notVoted.value.length+'人)'],['學號','姓名','組別','在線','最後連線'],
        ...notVoted.value.map(s=>[s.id,s.name,s.zodiac,s.online?'在線':'離線',s.seen])];
      const raw = [['',''],['原始明細'],['投票者學號','所屬組','第1名','第2名','第3名','時間'],
        ...rawVotes.value.map(v=>[v.voter,v.voterZodiac,v.rank1,v.rank2,v.rank3,v.time])];
      const csv = '﻿' + [head,...rows,...mtx,...mut,...nv,...raw].map(r=>r.map(c=>`"${c}"`).join(',')).join(sep);
      const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `poster_votes_${sid.value}.csv`;
      a.click();
    };

    // ── Advanced tab ─────────────────────────────────────────────────────
    const judgeScores  = ref(null);   // {zodiac: finalScore}
    const judgeRanks   = ref({});     // {zodiac: rank}
    const judgeLoading = ref(false);
    const judgeErr     = ref('');

    const loadJudgeScores = async () => {
      judgeLoading.value=true; judgeErr.value='';
      try {
        const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'getScores',secret:GAS_SECRET})});
        const j=await res.json();
        if(j.status!=='success') throw new Error(j.message||'GAS error');
        const sc={},rk={};
        j.groups.forEach(g=>{sc[g.zodiac]=g.final; rk[g.zodiac]=g.rank;});
        judgeScores.value=sc; judgeRanks.value=rk;
      } catch(e){ judgeErr.value='載入失敗：'+e.message; }
      finally { judgeLoading.value=false; }
    };

    // PageRank
    const pageRankScores = computed(()=>{
      if(!Object.keys(flowMatrix.value).length) return {};
      return pageRankCalc(flowMatrix.value, ZODIAC.map(z=>z.label));
    });
    const pageRankRanked = computed(()=>{
      const boardaRankMap={};
      rankedGroups.value.forEach((g,i)=>{boardaRankMap[g.label]=i+1;});
      return Object.entries(pageRankScores.value)
        .sort((a,b)=>b[1]-a[1])
        .map(([label,score],i)=>{
          const z=ZODIAC.find(z=>z.label===label);
          const bordaRank=boardaRankMap[label]||99;
          return {label,icon:z?.icon||'',score:score.toFixed(4),prRank:i+1,bordaRank,delta:bordaRank-(i+1)};
        });
    });

    // 3-way comparison
    const threeWayRanks = computed(()=>{
      if(!judgeScores.value) return [];
      const bordaMap={},prMap={};
      rankedGroups.value.forEach((g,i)=>{bordaMap[g.label]=i+1;});
      pageRankRanked.value.forEach(r=>{prMap[r.label]=r.prRank;});
      return ZODIAC.map(z=>{
        const borda=bordaMap[z.label]||99;
        const pr=prMap[z.label]||99;
        const judge=judgeRanks.value[z.label]||99;
        const avg=+((borda+pr+judge)/3).toFixed(1);
        const maxSpread=Math.max(borda,pr,judge)-Math.min(borda,pr,judge);
        return {label:z.label,icon:z.icon,borda,pr,judge,avg,maxSpread};
      }).filter(r=>r.borda<99).sort((a,b)=>a.avg-b.avg);
    });

    // Lift matrix
    const liftMatrix = computed(()=>{
      const m=flowMatrix.value;
      const labels=ZODIAC.map(z=>z.label);
      const outS={},inS={};
      let total=0;
      labels.forEach(f=>{outS[f]=labels.reduce((s,t)=>s+(m[f]?.[t]||0),0);});
      labels.forEach(t=>{inS[t]=labels.reduce((s,f)=>s+(m[f]?.[t]||0),0); total+=inS[t];});
      const lift={};
      labels.forEach(f=>{
        lift[f]={};
        labels.forEach(t=>{
          if(f===t){lift[f][t]=0;return;}
          const exp=(outS[f]*inS[t])/(total||1);
          const act=m[f]?.[t]||0;
          lift[f][t]=exp>0?+(act/exp).toFixed(1):0;
        });
      });
      return lift;
    });

    const liftCellStyle = (v) => {
      if(v>=3)   return 'background:#14532d;color:#4ade80;';
      if(v>=2)   return 'background:#166534;color:#86efac;';
      if(v>=1.5) return 'background:#1c3a28;color:#86efac;';
      if(v>=0.8) return 'background:#1e293b;color:#64748b;';
      if(v>=0.5) return 'background:#2a1f1f;color:#f87171;';
      return             'background:#450a0a;color:#f87171;';
    };

    // Temporal data
    const temporalData = computed(()=>{
      const all=Object.values(votes.value).filter(v=>v.submittedAt).sort((a,b)=>a.submittedAt-b.submittedAt);
      if(all.length<5) return null;
      const running={};
      ZODIAC.forEach(z=>{running[z.label]=0;});
      const snaps=[];
      const step=Math.max(1,Math.floor(all.length/30));
      all.forEach((v,i)=>{
        if(v.rank1) running[v.rank1]=(running[v.rank1]||0)+3;
        if(v.rank2) running[v.rank2]=(running[v.rank2]||0)+2;
        if(v.rank3) running[v.rank3]=(running[v.rank3]||0)+1;
        if(i%step===0||i===all.length-1){
          const t=new Date(v.submittedAt);
          snaps.push({x:i+1,label:`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`,scores:{...running}});
        }
      });
      return snaps;
    });

    let temporalChart=null;
    const buildTemporalChart=()=>{
      if(!temporalData.value||!document.getElementById('temporalChart')) return;
      if(temporalChart){try{temporalChart.destroy();}catch(e){} temporalChart=null;}
      const snaps=temporalData.value;
      const labels=snaps.map(s=>s.label);
      // Top 6 by final score
      const finalSnap=snaps[snaps.length-1].scores;
      const top6=Object.entries(finalSnap).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([l])=>l);
      const COLORS=['#f59e0b','#60a5fa','#4ade80','#f87171','#a78bfa','#34d399'];
      const datasets=top6.map((lbl,i)=>({
        label:lbl,
        data:snaps.map(s=>s.scores[lbl]||0),
        borderColor:COLORS[i], backgroundColor:'transparent',
        borderWidth:2.5, pointRadius:0, tension:0.3
      }));
      temporalChart=new Chart(document.getElementById('temporalChart'),{
        type:'line',
        data:{labels,datasets},
        options:{
          plugins:{legend:{position:'top',labels:{color:'#94a3b8',font:{size:11}}}},
          scales:{
            x:{ticks:{color:'#475569',maxTicksLimit:12},grid:{color:'#1e293b'}},
            y:{beginAtZero:true,ticks:{color:'#475569'},grid:{color:'#1e293b'},
               title:{display:true,text:'累積票數',color:'#475569'}}
          },
          responsive:true,maintainAspectRatio:true
        }
      });
    };

    const openAdvTab=()=>{
      tab.value='adv';
      nextTick(()=>buildTemporalChart());
    };

    watch(()=>votes.value,(()=>{
      if(tab.value==='adv') nextTick(()=>buildTemporalChart());
    }),{deep:true});

    connect();

    return { sid, tab, embedMode, connected, err, voteCount, rawVotes, rankedGroups, totalPts, maxPts, connect, exportCSV,
             notVoted, rosterCount, onlineNotVoted, ZODIAC, flowMatrix, matrixMax, rowTops,
             mutualPairs, mutualSet,
             counterfactual, voteConcentration, impactMatrix,
             judgeScores, judgeErr, judgeLoading, loadJudgeScores,
             pageRankRanked, threeWayRanks, liftMatrix, liftCellStyle,
             temporalData, openAdvTab };
  }
}).mount('#app');
</script>
</body>
</html>
