<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>海報回饋 — 三面向 profile + 榮譽榜</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root{
    --bg:#f4f4f5;--surface:#fff;--surface2:#fafafa;--border:#e4e4e7;
    --text:#18181b;--text2:#3f3f46;--muted:#71717a;--faint:#a1a1aa;
    --primary:#4f46e5;--primary-d:#4338ca;--primary-soft:#eef2ff;
    --ok:#15803d;--ok-l:#16a34a;--ok-soft:#f0fdf4;
    --danger:#dc2626;--danger-soft:#fef2f2;
    --accent:#b45309;--accent-l:#d97706;--accent-soft:#fffbeb;
    --gold:#ca8a04;--gold-soft:#fefce8;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);}
  .page{max-width:920px;margin:0 auto;padding:26px 18px 80px;}
  .hd h1{font-size:22px;font-weight:800;}
  .hd .sub{font-size:13px;color:var(--muted);margin-top:4px;}

  .tabbar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
          border-radius:12px;padding:4px;margin:20px 0;}
  .tabbar button{flex:1;padding:10px 16px;border:none;border-radius:9px;font-size:14px;
                 font-weight:700;cursor:pointer;background:none;color:var(--muted);transition:all .15s;}
  .tabbar button.active{background:var(--primary);color:#fff;}
  .tabbar button i{margin-right:6px;}

  .sec{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:18px;}
  .sec-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .sec-title i{color:var(--primary);}

  /* group selector */
  .grp-pills{display:flex;flex-wrap:wrap;gap:8px;}
  .pill{padding:8px 14px;border:1px solid var(--border);border-radius:20px;background:var(--surface);
        font-size:14px;font-weight:700;cursor:pointer;transition:all .12s;}
  .pill:hover{border-color:var(--primary);color:var(--primary);}
  .pill.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  /* profile card */
  .profile{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;}
  .profile-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:18px;
                padding-bottom:14px;border-bottom:2px solid var(--border);}
  .profile-head .zname{font-size:22px;font-weight:900;}
  .profile-head .topic{font-size:14px;color:var(--muted);}

  .lens{margin-bottom:16px;}
  .lens-row{display:flex;align-items:center;gap:12px;margin-bottom:5px;}
  .lens-name{min-width:84px;font-size:13px;font-weight:700;color:var(--text2);}
  .lens-bar-wrap{flex:1;height:14px;background:var(--surface2);border-radius:7px;overflow:hidden;}
  .lens-bar{height:100%;border-radius:7px;transition:width .5s;}
  .lens-tag{min-width:120px;font-size:12px;font-weight:700;text-align:right;}
  .lens-detail{font-size:11.5px;color:var(--muted);margin-left:96px;line-height:1.5;}

  .band{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:6px;}
  .band-hi{background:var(--ok-soft);color:var(--ok);border:1px solid #bbf7d0;}
  .band-mid{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .band-lo{background:var(--danger-soft);color:var(--danger);border:1px solid #fca5a5;}

  .insight-box{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .ib{padding:14px 16px;border-radius:11px;font-size:13px;line-height:1.65;}
  .ib-strong{background:var(--ok-soft);border:1px solid #bbf7d0;}
  .ib-grow{background:var(--accent-soft);border:1px solid #fde68a;}
  .ib h4{font-size:12px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .ib-strong h4{color:var(--ok);} .ib-grow h4{color:var(--accent);}
  .ib .body{color:var(--text2);}

  .dimfeedback{margin-top:14px;background:var(--surface2);border-radius:11px;padding:14px 16px;}
  .dimfeedback h4{font-size:12px;font-weight:800;color:var(--primary);margin-bottom:8px;}
  .dimfeedback .d{font-size:12px;line-height:1.6;margin-bottom:6px;color:var(--text2);}
  .dimfeedback .d b{color:var(--text);}

  /* honor roll */
  .awards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .award{border-radius:14px;padding:20px;border:1px solid var(--border);position:relative;overflow:hidden;}
  .award .ico{font-size:30px;margin-bottom:8px;}
  .award .atitle{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .award .winner{font-size:24px;font-weight:900;margin:4px 0;}
  .award .detail{font-size:12px;color:var(--muted);}
  .aw-gold{background:var(--gold-soft);border-color:#fde68a;}
  .aw-fire{background:var(--danger-soft);border-color:#fca5a5;}
  .aw-team{background:var(--ok-soft);border-color:#bbf7d0;}
  .aw-vis{background:var(--primary-soft);border-color:#c7d2fe;}
  .aw-all{background:#faf5ff;border-color:#e9d5ff;}

  .loading{text-align:center;padding:50px 20px;color:var(--muted);}
  .loading i{font-size:30px;margin-bottom:10px;display:block;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .note{font-size:11.5px;color:var(--muted);line-height:1.6;}
  .warn-map{background:var(--accent-soft);border:1px solid #fde68a;border-radius:10px;padding:12px 16px;font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6;}
  .warn-map strong{color:var(--accent);}
  @media(max-width:640px){.insight-box,.awards{grid-template-columns:1fr;}.lens-tag{min-width:90px;}}
  @media print{.page{padding:10px;}.profile,.sec{break-inside:avoid;}}
</style>
</head>
<body>
<div id="app">
<div class="page">

  <div class="hd">
    <h1><i class="fa-solid fa-comments" style="color:var(--primary);margin-right:8px;"></i>海報回饋報告</h1>
    <div class="sub">三面向 profile（同學共鳴 · 學術深度 · 綜合分析 + 團隊合作）· 私下個別回饋 + 公開榮譽榜</div>
  </div>

  <div v-if="loadState==='loading'" class="loading">
    <i class="fa-solid fa-circle-notch"></i>載入學生票選與評審分數中…
  </div>
  <div v-else-if="loadState==='error'" class="loading" style="color:var(--danger);">
    <i class="fa-solid fa-triangle-exclamation" style="animation:none;"></i> 資料載入失敗，請確認連線
  </div>

  <template v-else>
    <div class="tabbar">
      <button :class="{active:tab==='private'}" @click="tab='private'"><i class="fa-solid fa-user-group"></i>個別回饋</button>
      <button :class="{active:tab==='honor'}" @click="tab='honor'"><i class="fa-solid fa-award"></i>公開榮譽榜</button>
      <button :class="{active:tab==='team'}" @click="tab='team'"><i class="fa-solid fa-people-group"></i>團隊合作分析</button>
      <button :class="{active:tab==='trait'}" @click="tab='trait'"><i class="fa-solid fa-fingerprint"></i>學生特質側寫</button>
    </div>

    <!-- ═══ PRIVATE FEEDBACK ═══ -->
    <div v-show="tab==='private'">
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-hand-pointer"></i>選擇組別（此頁供私下回饋給該組）</div>
        <div class="grp-pills">
          <div v-for="z in ZODIAC" :key="z" class="pill" :class="{active:sel===z}" @click="sel=z">{{ z }}</div>
        </div>
      </div>

      <div v-if="sel" class="profile">
        <div class="profile-head">
          <span class="zname">{{ sel }}</span>
          <span class="topic">{{ topicOf(sel) || '（主題待對應）' }}</span>
        </div>

        <!-- Lens 1: student resonance -->
        <div class="lens">
          <div class="lens-row">
            <span class="lens-name">同學共鳴</span>
            <div class="lens-bar-wrap"><div class="lens-bar" :style="barStudent(sel)"></div></div>
            <span class="lens-tag">
              <span class="band" :class="bandClass(sel)">{{ bandLabel(sel) }}</span>
            </span>
          </div>
          <div class="lens-detail">{{ stu[sel]?.pts ?? 0 }} 票 · 全班 {{ N }} 人投票 · {{ bandExplain(sel) }}</div>
        </div>

        <!-- Lens 2: teacher academic -->
        <div class="lens">
          <div class="lens-row">
            <span class="lens-name">學術深度</span>
            <div class="lens-bar-wrap"><div class="lens-bar" :style="barTeacher(sel)"></div></div>
            <span class="lens-tag" style="color:var(--primary);">評審 {{ tea[sel]?.final?.toFixed(2) ?? '—' }} / 5</span>
          </div>
          <div class="lens-detail">病生理深度與內容正確性的專業評核（{{ teaTier(sel) }}）</div>
        </div>

        <!-- Lens 3: AI systematic (only if mapped) -->
        <div class="lens" v-if="aiOf(sel)">
          <div class="lens-row">
            <span class="lens-name">綜合分析</span>
            <div class="lens-bar-wrap"><div class="lens-bar" :style="barAI(sel)"></div></div>
            <span class="lens-tag" style="color:var(--accent-l);">AI {{ aiOf(sel).base.toFixed(2) }} / 5</span>
          </div>
          <div class="lens-detail">綜合選題、病理、視覺、整體四個面向的一致性評估</div>
        </div>

        <!-- Teamwork bonus -->
        <div class="lens" v-if="aiOf(sel)">
          <div class="lens-row">
            <span class="lens-name">團隊合作</span>
            <div class="lens-bar-wrap"><div class="lens-bar" :style="barTeam(sel)"></div></div>
            <span class="lens-tag" style="color:var(--ok);">{{ aiOf(sel).tw }} / 5 → 加分 +{{ aiOf(sel).bonus.toFixed(2) }}</span>
          </div>
          <div class="lens-detail">{{ aiOf(sel).notes.team }}</div>
        </div>

        <!-- Strength + Growth -->
        <div class="insight-box">
          <div class="ib ib-strong">
            <h4><i class="fa-solid fa-star"></i>強項</h4>
            <div class="body">{{ strengthText(sel) }}</div>
          </div>
          <div class="ib ib-grow">
            <h4><i class="fa-solid fa-seedling"></i>成長點</h4>
            <div class="body">{{ growthText(sel) }}</div>
          </div>
        </div>

        <!-- Dimension-level feedback from AI -->
        <div class="dimfeedback" v-if="aiOf(sel)">
          <h4><i class="fa-solid fa-list-check" style="margin-right:5px;"></i>逐面向具體回饋</h4>
          <div class="d"><b>選題需求（{{ aiOf(sel).dims[0] }}）：</b>{{ aiOf(sel).notes.sel }}</div>
          <div class="d"><b>病生理深度（{{ aiOf(sel).dims[1] }}）：</b>{{ aiOf(sel).notes.path }}</div>
          <div class="d"><b>視覺表達（{{ aiOf(sel).dims[2] }}）：</b>{{ aiOf(sel).notes.vis }}</div>
          <div class="d"><b>整體印象（{{ aiOf(sel).dims[3] }}）：</b>{{ aiOf(sel).notes.tot }}</div>
        </div>
        <div v-else class="note" style="margin-top:14px;">
          <i class="fa-solid fa-circle-info"></i> 此組尚未對應 AI 評估主題，補上 ZODIAC_TOPIC 對照後即顯示綜合分析與逐面向回饋。
        </div>
      </div>
      <div v-else class="note" style="text-align:center;padding:30px;">↑ 點選一個組別查看其私下回饋卡</div>
    </div>

    <!-- ═══ HONOR ROLL ═══ -->
    <div v-show="tab==='honor'">
      <div class="warn-map" v-if="mappedCount < 12">
        <strong>提醒：</strong>目前 {{ mappedCount }}/12 組已對應 AI 主題。「最佳團隊」「最佳視覺」獎需完整對應後才準確（目前依已對應組計算）。
        「人氣獎」「學術深度獎」由學生票與評審分直接決定，不受影響。
      </div>
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-trophy"></i>公開榮譽榜（只表揚得主，不公布完整排名）</div>
        <div class="awards">
          <div class="award aw-gold">
            <div class="ico">🎓</div>
            <div class="atitle">學術深度獎</div>
            <div class="winner">{{ awards.academic.z }}</div>
            <div class="detail">評審加權第一 · {{ awards.academic.v }} / 5　{{ topicOf(awards.academic.z) }}</div>
          </div>
          <div class="award aw-fire">
            <div class="ico">🔥</div>
            <div class="atitle">人氣獎</div>
            <div class="winner">{{ awards.popular.z }}</div>
            <div class="detail">學生票選第一 · {{ awards.popular.v }} 票（z = {{ awards.popular.z2 }}，顯著）</div>
          </div>
          <div class="award aw-team">
            <div class="ico">🤝</div>
            <div class="atitle">最佳團隊合作獎</div>
            <div class="winner">{{ awards.team.z || '待對應' }}</div>
            <div class="detail">{{ awards.team.detail }}</div>
          </div>
          <div class="award aw-vis">
            <div class="ico">🎨</div>
            <div class="atitle">最佳視覺表達獎</div>
            <div class="winner">{{ awards.visual.z || '待對應' }}</div>
            <div class="detail">{{ awards.visual.detail }}</div>
          </div>
          <div class="award aw-all" style="grid-column:1/-1;">
            <div class="ico">✦</div>
            <div class="atitle">全方位均衡獎</div>
            <div class="winner">{{ awards.allround.z || '待對應' }}</div>
            <div class="detail">{{ awards.allround.detail }}</div>
          </div>
        </div>
      </div>
      <div class="note">
        評選邏輯：學術深度獎＝評審加權最高；人氣獎＝學生票最高且統計顯著；最佳團隊＝AI 團隊合作分最高；
        最佳視覺＝AI 視覺表達分最高；全方位＝同學共鳴／學術深度／綜合分析三項標準化後總和最高。
      </div>
    </div>

    <!-- ═══ TEAMWORK ANALYSIS ═══ -->
    <div v-show="tab==='team'">

      <!-- Evidence matrix -->
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-clipboard-check"></i>團隊合作佐證矩陣</div>
        <div class="note" style="margin-bottom:12px;">
          依各組 PDF 中可擷取的協作佐證評定（5 類）。團隊合作為<strong>加分項</strong>：加分 = max(0,(分−3)×0.25)，上限 +0.5，基準 3 分不加不減。
        </div>
        <table>
          <thead>
            <tr>
              <th>組別</th>
              <th class="r" v-for="l in EV_LABELS" :key="l" style="text-align:center;">{{ l }}</th>
              <th class="r" style="text-align:center;">涵蓋</th>
              <th class="r" style="text-align:center;">團隊分</th>
              <th class="r" style="text-align:center;color:var(--ok);">加分</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="r in teamRanked" :key="r.z">
              <td>
                <span style="font-weight:700;">{{ r.z }}</span>
                <span style="font-size:11px;color:var(--muted);margin-left:4px;">{{ topicShort(r.z) }}</span>
              </td>
              <td class="c" v-for="(p,i) in r.ev" :key="i">
                <span v-if="p" style="color:var(--ok);font-weight:800;">✓</span>
                <span v-else style="color:var(--faint);">—</span>
              </td>
              <td class="c" style="font-weight:700;">{{ r.cnt }}/5</td>
              <td class="c"><span class="band" :class="r.tw>=4.5?'band-hi':r.tw>=3.5?'band-mid':'band-lo'">{{ r.tw }}</span></td>
              <td class="c" style="color:var(--ok);font-weight:700;">{{ r.bonus>0?'+'+r.bonus.toFixed(2):'—' }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Coverage -->
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-chart-simple"></i>各類佐證普及率</div>
        <div v-for="c in evCoverage" :key="c.label" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
          <span style="min-width:80px;font-size:13px;font-weight:700;color:var(--text2);">{{ c.label }}</span>
          <div style="flex:1;height:12px;background:var(--surface2);border-radius:6px;overflow:hidden;">
            <div :style="{width:c.pct+'%',height:'100%',borderRadius:'6px',background:c.pct>=70?'var(--ok)':c.pct>=40?'var(--accent-l)':'var(--danger)'}"></div>
          </div>
          <span style="min-width:64px;font-weight:700;font-size:13px;">{{ c.n }}/12 ({{ c.pct }}%)</span>
        </div>
        <div class="note" style="margin-top:8px;">
          經逐頁實際檢視：<strong>全班 12 組皆備有完整貢獻名單（學號或姓名）＋分工表＋研究歷程（各 100%）</strong>——團隊合作的紀錄是全班共同強項。
          差異主要在<strong>討論照片/截圖（50%）</strong>與<strong>時間線/階段（33%）</strong>——有附者額外呈現了「真實協作過程」。
        </div>
      </div>

      <!-- Discussion-evidence type grading -->
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-camera-retro"></i>討論證據類型分級（貼了哪一種照片）</div>
        <div class="note" style="margin-bottom:10px;">
          協作佐證真實性：露臉視訊會議 ＞ 視訊頭像/語音通話/實體照片 ＞ 文字截圖。經逐頁實際檢視分級。
        </div>
        <table>
          <thead><tr><th>組別</th><th>分級</th><th>討論證據類型</th></tr></thead>
          <tbody>
            <tr v-for="p in photoGraded" :key="p.z"
                :style="p.g===3?'background:var(--ok-soft)':p.g===0?'background:var(--danger-soft)':''">
              <td><span style="font-weight:700;">{{ p.z }}</span> <span style="font-size:11px;color:var(--muted);">{{ p.topic }}</span></td>
              <td style="white-space:nowrap;font-weight:700;"
                  :style="p.g===3?'color:var(--ok)':p.g===2?'color:var(--accent-l)':p.g===1?'color:var(--muted)':'color:var(--danger)'">{{ p.glabel }}</td>
              <td style="font-size:12px;color:var(--text2);">{{ p.t }}</td>
            </tr>
          </tbody>
        </table>
        <div class="note" style="margin-top:8px;">
          12 組中 11 組附有討論證據（僅申猴無）；其中 <strong>戌狗、寅虎</strong>提供最高規格的露臉視訊會議截圖。
        </div>
      </div>

      <!-- Timeline sophistication grading -->
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-diagram-project"></i>時間線/協作歷程 — 細膩分級</div>
        <div class="note" style="margin-bottom:10px;">
          歷程視覺化的成熟度：泳道圖（lanes × 時間，專案管理等級）＞ 階段時間線 ＞ 里程碑/日期標註 ＞ 無。
        </div>
        <table>
          <thead><tr><th>組別</th><th>分級</th><th>呈現方式</th></tr></thead>
          <tbody>
            <tr v-for="p in timelineGraded" :key="p.z"
                :style="p.g===3?'background:var(--ok-soft)':''">
              <td><span style="font-weight:700;">{{ p.z }}</span> <span style="font-size:11px;color:var(--muted);">{{ p.topic }}</span></td>
              <td style="white-space:nowrap;font-weight:700;"
                  :style="p.g===3?'color:var(--ok)':p.g===2?'color:var(--accent-l)':p.g===1?'color:var(--muted)':'color:var(--faint)'">{{ p.glabel }}</td>
              <td style="font-size:12px;color:var(--text2);">{{ p.t }}</td>
            </tr>
          </tbody>
        </table>
        <div class="note" style="margin-top:8px;">
          <strong>子鼠（呼吸道）是唯一使用泳道圖（Swimlane）者</strong>——以 全體/A/B/C/D 五條泳道對應時間軸，是全班協作歷程視覺化的最高標竿，也是其團隊合作 5.0 的核心依據。
        </div>
      </div>

      <!-- Task-distribution equity -->
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-users-between-lines"></i>任務分配均勻度（真分工 vs 名義分工）</div>
        <div class="note" style="margin-bottom:10px;">
          分工表的<strong>任務指派粒度</strong>：每人/每段是否有實質專責，還是多數僅列「參與討論」。

createApp({
  setup(){
    // ── ROOT: exclude debug/test accounts (S1101, S1102, S111000999…) from ALL analysis ──
    const isDebug = (uid,sid)=>{ const s=String(sid||uid||''); return !/^S?11[1-4]003\d{3,4}$/.test(s); };
    const stripDebug = (obj)=>{ const o={}; Object.entries(obj).forEach(([k,v])=>{ if(!isDebug(k, v&&v.profile&&v.profile.StudentId))o[k]=v; }); return o; };
    const _qtab=new URLSearchParams(location.search).get('tab');
    const tab=ref(['private','honor','team','trait'].includes(_qtab)?_qtab:'private');
    const sel=ref('');
    const loadState=ref('loading');
    const stu=ref({});   // zodiac → {pts, z}
    const tea=ref({});   // zodiac → {final, rank}
    const stu_raw=ref({}); // uid → full student record (for contribution metrics)
    const N=ref(0);

    const topicOf=(z)=>{ const k=ZODIAC_TOPIC[z]; return k&&AI_EVAL[k]?AI_EVAL[k].topic:''; };
    const aiOf  =(z)=>{ const k=ZODIAC_TOPIC[z]; return k?AI_EVAL[k]:null; };
    const mappedCount=computed(()=>Object.values(ZODIAC_TOPIC).filter(Boolean).length);

    // significance bands
    const bandOf=(z)=>{ const s=stu.value[z]; if(!s)return'mid'; return s.z>2?'hi':s.z<-2?'lo':'mid'; };
    const bandClass=(z)=>({hi:'band-hi',mid:'band-mid',lo:'band-lo'}[bandOf(z)]);
    const bandLabel=(z)=>({hi:'顯著高 🟢',mid:'隨機範圍 ⚪',lo:'低於隨機 🔴'}[bandOf(z)]);
    const bandExplain=(z)=>{const b=bandOf(z); const zz=stu.value[z]?.z?.toFixed(2)??'—';
      return b==='hi'?`z = ${zz}，明顯超出隨機投票，真實人氣`:
             b==='lo'?`z = ${zz}，低於隨機期望`:
             `z = ${zz}，與多數組同屬統計平手帶（中段排名差異多為隨機）`;};

    const teaTier=(z)=>{const r=tea.value[z]?.rank; if(!r)return'—'; return r<=4?'前段':r<=8?'中段':'後段';};

    // bar styles (normalize to 0-1 then %)
    const barStudent=(z)=>{const s=stu.value[z]; if(!s)return'width:0';
      const pct=Math.max(8,Math.min(100,(s.z+3)/6*100)); // z -3..+3 → 0..100
      const c=bandOf(z)==='hi'?'var(--ok)':bandOf(z)==='lo'?'var(--danger)':'var(--faint)';
      return `width:${pct}%;background:${c}`;};
    const barTeacher=(z)=>{const v=tea.value[z]?.final||0; return `width:${v/5*100}%;background:var(--primary)`;};
    const barAI=(z)=>{const a=aiOf(z); if(!a)return'width:0'; return `width:${a.base/5*100}%;background:var(--accent-l)`;};
    const barTeam=(z)=>{const a=aiOf(z); if(!a)return'width:0'; return `width:${a.tw/5*100}%;background:var(--ok-l)`;};

    // strength / growth auto-text from available lenses (normalized 0-1)
    const norm=(z)=>{
      const out={};
      const s=stu.value[z]; if(s) out['同學共鳴']=Math.max(0,Math.min(1,(s.z+3)/6));
      const t=tea.value[z]; if(t) out['學術深度']=t.final/5;
      const a=aiOf(z); if(a) out['綜合分析']=a.base/5;
      return out;
    };
    const strengthText=(z)=>{
      const n=norm(z); const keys=Object.keys(n); if(!keys.length)return'資料載入中';
      const best=keys.reduce((a,b)=>n[b]>n[a]?b:a);
      const map={'同學共鳴':'同學給予高度共鳴——你們的海報在全班眼中很有吸引力。',
                 '學術深度':'評審肯定你們的學術深度與病生理正確性——內容紮實。',
                 '綜合分析':'在選題、病理、視覺、整體四個面向都表現得均衡而完整。'};
      const a=aiOf(z);
      let extra='';
      if(a&&a.bonus>0.3) extra=' 你們的分工與討論紀錄也很完整，是團隊合作的好示範。';
      return map[best]+extra;
    };
    const growthText=(z)=>{
      const n=norm(z); const keys=Object.keys(n); if(keys.length<2)return'持續保持，期待下一份作品。';
      const worst=keys.reduce((a,b)=>n[b]<n[a]?b:a);
      const map={'同學共鳴':'可在視覺吸引力與第一眼溝通上再加強，讓同學在快速瀏覽時更容易被吸引。',
                 '學術深度':'病生理機轉的因果鏈可再深化，補強分子層次與藥物作用機制的正確性。',
                 '綜合分析':'整體呈現的完整度與各面向的均衡可再加強。'};
      const a=aiOf(z);
      let extra='';
      if(a){ const dn=['選題需求','病生理深度','視覺表達','整體印象'][a.dims.indexOf(Math.min(...a.dims))];
        extra=` 具體面向上，「${dn}」最有提升空間。`; }
      return map[worst]+extra;
    };

    // ── Honor roll awards ─────────────────────────────────────────────────
    const awards=computed(()=>{
      const T=tea.value, S=stu.value;
      // academic: teacher rank 1
      let acad=ZODIAC.filter(z=>T[z]).sort((a,b)=>T[a].rank-T[b].rank)[0]||'';
      // popular: student pts max
      let pop=ZODIAC.filter(z=>S[z]).sort((a,b)=>S[b].pts-S[a].pts)[0]||'';
      // team: AI tw max (among mapped)
      let teamZ=ZODIAC.filter(z=>aiOf(z)).sort((a,b)=>aiOf(b).tw-aiOf(a).tw)[0]||'';
      // visual: AI dims[2] max (among mapped)
      let vis=ZODIAC.filter(z=>aiOf(z)).sort((a,b)=>aiOf(b).dims[2]-aiOf(a).dims[2])[0]||'';
      // allround: normalized sum of 3 lenses
      const score=(z)=>{const n=norm(z); return (n['同學共鳴']||0)+(n['學術深度']||0)+(n['綜合分析']||0);};
      let all=ZODIAC.filter(z=>tea.value[z]&&stu.value[z]&&aiOf(z)).sort((a,b)=>score(b)-score(a))[0]||'';
      return {
        academic:{z:acad, v:T[acad]?.final?.toFixed(2)??'—'},
        popular: {z:pop,  v:S[pop]?.pts??'—', z2:S[pop]?.z?.toFixed(2)??'—'},
        team:    {z:teamZ, detail: teamZ? `AI 團隊合作 ${aiOf(teamZ).tw}/5 · ${topicOf(teamZ)}` : '需完成 AI 主題對應'},
        visual:  {z:vis,  detail: vis? `AI 視覺表達 ${aiOf(vis).dims[2]}/5 · ${topicOf(vis)}` : '需完成 AI 主題對應'},
        allround:{z:all,  detail: all? `三面向標準化總和最高 · ${topicOf(all)}` : '需完成 AI 主題對應'},
      };
    });

    // ── Teamwork analysis ─────────────────────────────────────────────────
    const topicShort=(z)=>{const t=topicOf(z); return t? t.replace(/（.*）/,'').slice(0,8):'';};
    const teamRanked=computed(()=>
      ZODIAC.map(z=>{
        const a=aiOf(z), ev=TEAM_EV[z]||[0,0,0,0,0];
        return {z, ev, cnt:ev.reduce((s,x)=>s+x,0),
                tw:a?a.tw:3, bonus:a?a.bonus:0, note:a?a.notes.team:'（待對應）'};
      }).sort((a,b)=>b.tw-a.tw || b.cnt-a.cnt)
    );
    const evCoverage=computed(()=>
      EV_LABELS.map((label,i)=>{
        const n=ZODIAC.filter(z=>TEAM_EV[z]?.[i]).length;
        return {label, n, pct:Math.round(n/12*100)};
      })
    );
    const GRADE_LABEL={3:'★★★ 露臉視訊',2:'★★ 視訊頭像/語音/實體',1:'★ 文字截圖',0:'— 無'};
    const photoGraded=computed(()=>
      ZODIAC.map(z=>({z, topic:topicShort(z), g:TEAM_PHOTO[z]?.g??0, t:TEAM_PHOTO[z]?.t||'—',
        glabel:GRADE_LABEL[TEAM_PHOTO[z]?.g??0]}))
        .sort((a,b)=>b.g-a.g)
    );
    const TL_LABEL={3:'★★★ 泳道圖',2:'★★ 階段時間線',1:'★ 里程碑/日期',0:'— 無'};
    const timelineGraded=computed(()=>
      ZODIAC.map(z=>({z, topic:topicShort(z), g:TEAM_TIMELINE[z]?.g??0, t:TEAM_TIMELINE[z]?.t||'—',
        glabel:TL_LABEL[TEAM_TIMELINE[z]?.g??0]}))
        .sort((a,b)=>b.g-a.g)
    );
    const EQ_LABEL={3:'★★★ 高度分工',2:'★★ 區段分明',1:'★ 任務集中'};
    const equityGraded=computed(()=>
      ZODIAC.map(z=>({z, topic:topicShort(z), g:TEAM_EQUITY[z]?.g??0, t:TEAM_EQUITY[z]?.t||'—',
        glabel:EQ_LABEL[TEAM_EQUITY[z]?.g??1]}))
        .sort((a,b)=>b.g-a.g)
    );

    // ── Live Firebase self-reported contributions (per zodiac) ─────────────
    const SUBST=['文獻與研究','技術與實作'];
    const contribMetrics=computed(()=>{
      const g={}; ZODIAC.forEach(z=>g[z]={m:0,filled:0,subst:0,items:0,custom:0});
      Object.values(stu_raw.value).forEach(s=>{
        const z=s?.profile?.Zodiac; if(!g[z]) return;
        g[z].m++;
        const c=s?.tasks?.assignment?.contributions;
        if(Array.isArray(c)&&c.length){
          g[z].filled++; g[z].items+=c.length;
          if(c.some(x=>SUBST.includes(x))) g[z].subst++;
          if(c.some(x=>String(x).startsWith('其他：'))) g[z].custom++;
        }
      });
      return ZODIAC.map(z=>{
        const d=g[z];
        return {z, topic:topicShort(z), members:d.m, filled:d.filled,
          fillRate:d.m?Math.round(d.filled/d.m*100):0,
          substRate:d.filled?Math.round(d.subst/d.filled*100):0,
          avgItems:d.filled?+(d.items/d.filled).toFixed(2):0, custom:d.custom};
      }).filter(r=>r.members>0).sort((a,b)=>b.substRate-a.substRate);
    });
    // ── Student collaboration-trait profile (live from Firebase) ───────────
    const TRAIT_MAP={'文獻與研究':'研究型','技術與實作':'實作型','內容與討論':'內容型','進度與溝通':'協調型','協作支援':'支援型'};
    const TRAIT_ORDER=['內容型','研究型','支援型','協調型','實作型'];
    const TRAIT_ICON={'研究型':'🔬','實作型':'🛠','內容型':'💬','協調型':'🧭','支援型':'🤝'};
    const traitRecs=computed(()=>{
      const out=[];
      Object.values(stu_raw.value).forEach(s=>{
        const a=s?.tasks?.assignment||{};
        const c=a.contributions||[];
        if(!Array.isArray(c)||!c.length) return;
        const base=c.filter(x=>!String(x).startsWith('其他'));
        const traits=[...new Set(base.map(x=>TRAIT_MAP[x]).filter(Boolean))];
        out.push({role:a.role, traits, k:traits.length, custom:c.some(x=>String(x).startsWith('其他：'))});
      });
      return out;
    });
    const traitStats=computed(()=>{
      const recs=traitRecs.value, N=recs.length;
      if(!N) return null;
      const tc={}; TRAIT_ORDER.forEach(t=>tc[t]=0);
      recs.forEach(r=>r.traits.forEach(t=>{if(tc[t]!==undefined)tc[t]++;}));
      const traitPct=TRAIT_ORDER.map(t=>({label:t,icon:TRAIT_ICON[t],n:tc[t],pct:Math.round(tc[t]/N*100)}));
      const bk={'全能型':0,'多元型':0,'雙能型':0,'專精型':0};
      recs.forEach(r=>{ bk[r.k>=4?'全能型':r.k===3?'多元型':r.k===2?'雙能型':'專精型']++; });
      const breadth=[['全能型','4–5 類'],['多元型','3 類'],['雙能型','2 類'],['專精型','單一類']]
        .map(([k,d])=>({label:k,desc:d,n:bk[k],pct:Math.round(bk[k]/N*100)}));
      const leaders=recs.filter(r=>r.role==='leader'), members=recs.filter(r=>r.role!=='leader');
      const lc={}; TRAIT_ORDER.forEach(t=>lc[t]=0);
      leaders.forEach(r=>r.traits.forEach(t=>{if(lc[t]!==undefined)lc[t]++;}));
      const leaderProfile=TRAIT_ORDER.map(t=>({label:t,icon:TRAIT_ICON[t],n:lc[t],pct:leaders.length?Math.round(lc[t]/leaders.length*100):0}))
        .sort((a,b)=>b.pct-a.pct);
      return {N, traitPct, breadth,
        leaderAvg: leaders.length?+(leaders.reduce((s,r)=>s+r.k,0)/leaders.length).toFixed(1):0,
        memberAvg: members.length?+(members.reduce((s,r)=>s+r.k,0)/members.length).toFixed(1):0,
        leaderProfile, leaderN:leaders.length,
        customN: recs.filter(r=>r.custom).length };
    });
    // ── Kolb 學習風格疊加（詮釋性，非經驗證 LSI 測驗）──
    const KOLB_MAP={'內容與討論':'發散型','文獻與研究':'同化型','技術與實作':'收斂型','進度與溝通':'適應型','協作支援':'適應型'};
    const KOLB_ORDER=['發散型','同化型','收斂型','適應型'];
    const KOLB_DESC={'發散型':'感受＋觀察｜創意、多元視角、愛討論','同化型':'觀察＋思考｜理論、文獻、邏輯統整','收斂型':'思考＋實作｜技術、解決問題、動手做','適應型':'實作＋感受｜行動、協調、推進落實'};
    const kolbStats=computed(()=>{
      const cnt={發散型:0,同化型:0,收斂型:0,適應型:0}; let tot=0;
      Object.values(stu_raw.value).forEach(s=>{
        (s?.tasks?.assignment?.contributions||[]).forEach(x=>{const k=KOLB_MAP[x];if(k){cnt[k]++;tot++;}});
      });
      if(!tot) return null;
      return {tot, mix:KOLB_ORDER.map(k=>({label:k,desc:KOLB_DESC[k],n:cnt[k],pct:Math.round(cnt[k]/tot*100)}))};
    });
    const groupKolb=computed(()=>
      ZODIAC.map(z=>{
        const cnt={發散型:0,同化型:0,收斂型:0,適應型:0}; let tot=0;
        Object.values(stu_raw.value).forEach(s=>{
          if(s?.profile?.Zodiac!==z) return;
          (s?.tasks?.assignment?.contributions||[]).forEach(x=>{const k=KOLB_MAP[x];if(k){cnt[k]++;tot++;}});
        });
        if(!tot) return null;
        const dom=KOLB_ORDER.reduce((a,b)=>cnt[b]>cnt[a]?b:a);
        return {z,topic:topicShort(z),dom,convPct:Math.round(cnt.收斂型/tot*100)};
      }).filter(Boolean)
    );

    const groupTraits=computed(()=>{
      const g={}; ZODIAC.forEach(z=>g[z]={研究型:0,實作型:0,內容型:0,協調型:0,支援型:0});
      Object.values(stu_raw.value).forEach(s=>{
        const z=s?.profile?.Zodiac; if(!g[z]) return;
        const c=s?.tasks?.assignment?.contributions||[];
        c.forEach(x=>{ const t=TRAIT_MAP[x]; if(t)g[z][t]++; });
      });
      return ZODIAC.map(z=>({z,topic:topicShort(z),...g[z],tech:g[z].實作型,
        techFlag:g[z].實作型===0?'缺':g[z].實作型<=2?'稀缺':'OK'}))
        .filter(r=>Object.values(g[r.z]).some(v=>v>0));
    });

    const pearson=(xs,ys)=>{
      const n=xs.length; if(n<2)return 0;
      const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
      const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
      const den=Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0)*ys.reduce((s,y)=>s+(y-my)**2,0));
      return den?num/den:0;
    };
    const teamCorr=computed(()=>{
      const zs=ZODIAC.filter(z=>aiOf(z)&&tea.value[z]&&stu.value[z]);
      if(zs.length<3) return {teacher:0,student:0,ai:0,lowVar:true,sd:0};
      const tw=zs.map(z=>aiOf(z).tw);
      const m=tw.reduce((a,b)=>a+b,0)/tw.length;
      const sd=Math.sqrt(tw.reduce((s,x)=>s+(x-m)**2,0)/tw.length);
      // tw is near-uniform after correction → Pearson r is not meaningful (point-biserial on ~binary)
      const lowVar = sd < 0.35;
      return {
        teacher:+pearson(tw,zs.map(z=>tea.value[z].final)).toFixed(2),
        student:+pearson(tw,zs.map(z=>stu.value[z].z)).toFixed(2),
        ai:+pearson(tw,zs.map(z=>aiOf(z).base)).toFixed(2),
        lowVar, sd:+sd.toFixed(2),
      };
    });
    const corrLabel=(r)=>{
      const a=Math.abs(r);
      const dir=r>0?'正':'負';
      const str=a>=0.7?'強':a>=0.4?'中等':a>=0.2?'弱':'幾乎無';
      return a<0.2?'幾乎無相關（獨立面向）':`${str}${dir}相關`;
    };

    onMounted(async()=>{
      try{
        // Teacher (GAS)
        const tr=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'getScores',secret:GAS_SECRET})});
        const tj=await tr.json();
        const tmap={}; tj.groups.forEach(g=>{tmap[g.zodiac]={final:g.final,rank:g.rank};});
        tea.value=tmap;

        // Student (Firebase)
        const [appMod,dbMod,authMod]=await Promise.all([
          import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'),
          import('https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js'),
          import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js')]);
        const app=appMod.initializeApp(FIREBASE);
        const db=dbMod.getDatabase(app); const auth=authMod.getAuth(app);
        await authMod.signInAnonymously(auth);
        dbMod.onValue(dbMod.ref(db,`classrooms/${SESSION}/posterVotes`),snap=>{
          const v=stripDebug(snap.val()||{});
          const pts={}; ZODIAC.forEach(z=>pts[z]=0);
          Object.values(v).forEach(o=>{
            if(o.rank1&&pts[o.rank1]!==undefined)pts[o.rank1]+=3;
            if(o.rank2&&pts[o.rank2]!==undefined)pts[o.rank2]+=2;
            if(o.rank3&&pts[o.rank3]!==undefined)pts[o.rank3]+=1;
          });
          const n=Object.keys(v).length; N.value=n;
          const E=n/2, sig=Math.sqrt(n*118/121)||1;
          const smap={}; ZODIAC.forEach(z=>{smap[z]={pts:pts[z],z:+((pts[z]-E)/sig).toFixed(2)};});
          stu.value=smap;
          loadState.value='ready';
        },()=>{loadState.value='error';});
        dbMod.onValue(dbMod.ref(db,`classrooms/${SESSION}/students`),snap=>{
          stu_raw.value=stripDebug(snap.val()||{});
        });
      }catch(e){console.error(e);loadState.value='error';}
    });

    return {tab,sel,loadState,stu,tea,N,ZODIAC,EV_LABELS,topicOf,aiOf,mappedCount,
      bandClass,bandLabel,bandExplain,teaTier,
      barStudent,barTeacher,barAI,barTeam,strengthText,growthText,awards,
      topicShort,teamRanked,evCoverage,teamCorr,corrLabel,photoGraded,timelineGraded,equityGraded,contribMetrics,
      traitStats,groupTraits,kolbStats,groupKolb};
  }
}).mount('#app');
</script>
</body>
