<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>海報評審 · 分數報告</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f4f4f5;--surface:#fff;--surface2:#fafafa;--border:#e4e4e7;
    --text:#18181b;--text2:#3f3f46;--muted:#71717a;--faint:#a1a1aa;
    --primary:#4f46e5;--primary-d:#4338ca;--primary-soft:#eef2ff;
    --ok:#15803d;--ok-l:#16a34a;--ok-soft:#f0fdf4;
    --danger:#dc2626;--danger-soft:#fef2f2;
    --accent:#b45309;--accent-l:#d97706;--accent-soft:#fffbeb;
    --gold:#ca8a04;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);}
  .page{max-width:1100px;margin:0 auto;padding:28px 20px 80px;}

  .hd{margin-bottom:24px;}
  .hd h1{font-size:22px;font-weight:800;}
  .hd .sub{font-size:13px;color:var(--muted);margin-top:4px;}

  /* stat cards */
  .stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;
        padding:14px 18px;min-width:130px;}
  .stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px;}
  .stat .val{font-size:26px;font-weight:800;}

  /* section */
  .sec{background:var(--surface);border:1px solid var(--border);border-radius:14px;
       padding:20px 22px;margin-bottom:20px;}
  .sec-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .sec-title i{color:var(--primary);}

  /* ranking table */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;
           text-transform:uppercase;letter-spacing:.04em;padding:9px 12px;
           border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
  thead th.r{text-align:right;}
  tbody tr{border-bottom:1px solid var(--border);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--surface2);}
  td{padding:10px 12px;vertical-align:middle;}
  td.r{text-align:right;}
  .rank-num{font-size:18px;font-weight:800;width:32px;text-align:center;}
  .rank-1{color:var(--gold);}
  .rank-2{color:var(--faint);}
  .rank-3{color:var(--accent-l);}
  .zodiac-name{font-weight:700;font-size:14px;}
  .elem-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;
              border-radius:6px;margin-left:6px;}
  .elem-火{background:#fef2f2;color:#b91c1c;}
  .elem-水{background:#eff6ff;color:#1d4ed8;}
  .elem-木{background:#f0fdf4;color:#15803d;}
  .elem-土{background:#fffbeb;color:#92400e;}
  .elem-氣{background:#f5f3ff;color:#6d28d9;}
  .score-bar{height:8px;border-radius:4px;background:var(--primary);display:inline-block;vertical-align:middle;margin-left:8px;}
  .judge-scores{font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px;}

  /* chart containers */
  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .chart-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;}
  .chart-box.full{grid-column:1/-1;}
  .chart-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text2);}
  canvas{max-height:320px;}

  /* outlier */
  .outlier-badge{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;
                 border-radius:6px;background:var(--danger-soft);color:var(--danger);
                 border:1px solid #fca5a5;}

  /* heatmap */
  .heatmap{overflow-x:auto;}
  .hm-table{border-collapse:collapse;font-size:12px;width:100%;}
  .hm-table th{background:var(--surface2);color:var(--muted);font-size:10px;font-weight:700;
               text-transform:uppercase;padding:6px 10px;white-space:nowrap;text-align:center;}
  .hm-table th.lh{text-align:left;}
  .hm-table td{padding:6px 10px;text-align:center;font-weight:700;font-size:13px;}
  .hm-table tr:hover td{opacity:.85;}
  .hm-0{background:#f4f4f5;color:#a1a1aa;}

  /* discussion */
  .discussion{font-size:13px;line-height:1.7;color:var(--text2);}
  .discussion h3{font-size:14px;font-weight:700;color:var(--text);margin:16px 0 6px;}
  .discussion h3:first-child{margin-top:0;}
  .discussion ul{padding-left:18px;margin:4px 0;}
  .kv{display:flex;gap:8px;align-items:baseline;margin:3px 0;}
  .kv .k{min-width:130px;color:var(--muted);font-size:12px;}
  .kv .v{font-weight:700;}

  /* tabs */
  .tabbar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
          border-radius:12px;padding:4px;margin-bottom:22px;}
  .tabbar button{flex:1;padding:9px 16px;border:none;border-radius:9px;font-size:14px;
                 font-weight:700;cursor:pointer;background:none;color:var(--muted);transition:all .15s;}
  .tabbar button.active{background:var(--primary);color:#fff;}
  .tabbar button i{margin-right:6px;}

  /* vote tab */
  .vote-session-form{display:flex;gap:10px;align-items:center;flex-wrap:wrap;
                     background:var(--primary-soft);border:1px solid #c7d2fe;
                     border-radius:12px;padding:14px 18px;margin-bottom:20px;}
  .vote-session-form input{flex:1;min-width:180px;padding:9px 14px;border:1px solid var(--border);
                           border-radius:9px;font-size:13px;outline:none;font-family:monospace;}
  .vote-session-form input:focus{border-color:var(--primary);}
  .vote-session-form button{padding:9px 18px;border:none;border-radius:9px;font-size:13px;
                            font-weight:700;background:var(--primary);color:#fff;cursor:pointer;}
  .agree-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;
               border-radius:6px;background:var(--ok-soft);color:var(--ok);border:1px solid #bbf7d0;}
  .disagree-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;
                  border-radius:6px;background:var(--danger-soft);color:var(--danger);border:1px solid #fca5a5;}
  .rank-arrow{font-size:12px;margin-left:4px;}
  .rank-up{color:var(--ok);}
  .rank-down{color:var(--danger);}

  /* loading */
  .loading{text-align:center;padding:80px 20px;color:var(--muted);}
  .loading i{font-size:36px;margin-bottom:12px;display:block;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:680px){.chart-grid{grid-template-columns:1fr;}.chart-box.full{grid-column:1;}}
  @media print{.page{padding:10px;}}
</style>
</head>
<body>
<div id="app">
  <div class="page">

    <div class="hd">
      <h1><i class="fa-solid fa-chart-bar" style="color:var(--primary);margin-right:8px;"></i>海報評審分析報告</h1>
      <div class="sub">藥學系 Pathophysiology Poster Review 2026 · 3 位評審 · 12 組 · 加權分 = 50% 面向均分 + 50% 整體印象</div>
    </div>

    <!-- Tab bar -->
    <div class="tabbar">
      <button :class="{active:tab==='judge'}" @click="() => tab='judge'">
        <i class="fa-solid fa-gavel"></i>評審分析
      </button>
      <button :class="{active:tab==='votes'}" @click="() => openVotesTab()">
        <i class="fa-solid fa-square-poll-vertical"></i>學生票選
      </button>
      <button :class="{active:tab==='ml'}" @click="() => openMLTab()">
        <i class="fa-solid fa-brain"></i>ML 分析
      </button>
    </div>

    <!-- ═══ JUDGE TAB ═══ -->
    <div v-show="tab==='judge'">

    <div v-if="state==='loading'" class="loading">
      <i class="fa-solid fa-circle-notch"></i>載入評分資料中…
    </div>
    <div v-else-if="state==='error'" class="loading" style="color:var(--danger);">
      <i class="fa-solid fa-triangle-exclamation" style="animation:none;"></i>
      無法讀取資料，請確認 GAS_URL 設定及 GAS 已部署最新版本。
    </div>

    <template v-else>

      <!-- Stat cards -->
      <div class="stat-row">
        <div class="stat">
          <div class="lbl">評審人數</div>
          <div class="val" style="color:var(--primary);">{{ submittedCount }} / 3</div>
        </div>
        <div class="stat">
          <div class="lbl">最高分</div>
          <div class="val" style="color:var(--gold);">{{ maxFinal }}</div>
        </div>
        <div class="stat">
          <div class="lbl">最低分</div>
          <div class="val" style="color:var(--muted);">{{ minFinal }}</div>
        </div>
        <div class="stat">
          <div class="lbl">全體均分</div>
          <div class="val" style="color:var(--ok);">{{ meanFinal }}</div>
        </div>
        <div class="stat">
          <div class="lbl">標準差</div>
          <div class="val">{{ stdFinal }}</div>
        </div>
        <div class="stat">
          <div class="lbl">評分落差</div>
          <div class="val" style="color:var(--accent-l);">{{ rangeFinal }}</div>
        </div>
      </div>

      <!-- Ranking table -->
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-trophy"></i>最終排名</div>
        <table>
          <thead>
            <tr>
              <th style="width:42px;">排名</th>
              <th>組別</th>
              <th class="r">★ 最終加權分</th>
              <th class="r">面向均分</th>
              <th class="r">整體印象均</th>
              <th class="r">評審A</th>
              <th class="r">評審B</th>
              <th class="r">評審C</th>
              <th class="r">離群偵測</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="g in ranked" :key="g.zodiac"
                :style="outlierMap[g.zodiac]?.diff>0?'background:#fffbeb':''">
              <td>
                <span class="rank-num" :class="'rank-'+g.rank">
                  {{ g.rank===1?'🥇':g.rank===2?'🥈':g.rank===3?'🥉':g.rank }}
                </span>
              </td>
              <td>
                <span class="zodiac-name">{{ g.zodiac }}</span>
                <span class="elem-badge" :class="'elem-'+g.element">{{ g.element }}</span>
                <div class="judge-scores">
                  <span style="color:var(--primary);font-weight:700;">A</span> {{ judgeWeighted(g,'A').toFixed(1) }}
                  &nbsp;
                  <span style="color:var(--ok);font-weight:700;">B</span> {{ judgeWeighted(g,'B').toFixed(1) }}
                  &nbsp;
                  <span style="color:var(--accent-l);font-weight:700;">C</span> {{ judgeWeighted(g,'C').toFixed(1) }}
                </div>
              </td>
              <td class="r">
                <strong style="font-size:16px;">{{ g.final.toFixed(2) }}</strong>
                <div style="margin-top:4px;">
                  <span class="score-bar" :style="{width: (g.final/5*80)+'px', opacity:0.7}"></span>
                </div>
              </td>
              <td class="r">{{ g.avg.dimAvg }}</td>
              <td class="r">{{ g.avg.total }}</td>
              <td class="r" :style="outlierMap[g.zodiac]?.judge==='A'?'color:var(--danger);font-weight:800;':'color:var(--primary);'">
                {{ g.A.total>0 ? judgeWeighted(g,'A').toFixed(1) : '—' }}
                <i v-if="outlierMap[g.zodiac]?.judge==='A'" class="fa-solid fa-triangle-exclamation" style="font-size:10px;margin-left:3px;"></i>
              </td>
              <td class="r" :style="outlierMap[g.zodiac]?.judge==='B'?'color:var(--danger);font-weight:800;':'color:var(--ok);'">
                {{ g.B.total>0 ? judgeWeighted(g,'B').toFixed(1) : '—' }}
                <i v-if="outlierMap[g.zodiac]?.judge==='B'" class="fa-solid fa-triangle-exclamation" style="font-size:10px;margin-left:3px;"></i>
              </td>
              <td class="r" :style="outlierMap[g.zodiac]?.judge==='C'?'color:var(--danger);font-weight:800;':'color:var(--accent-l);'">
                {{ g.C.total>0 ? judgeWeighted(g,'C').toFixed(1) : '—' }}
                <i v-if="outlierMap[g.zodiac]?.judge==='C'" class="fa-solid fa-triangle-exclamation" style="font-size:10px;margin-left:3px;"></i>
              </td>
              <td class="r">
                <span v-if="outlierMap[g.zodiac]?.diff>0" class="outlier-badge">
                  評審{{ outlierMap[g.zodiac].judge }} ±{{ outlierMap[g.zodiac].diff }}
                </span>
                <span v-else style="color:var(--faint);font-size:11px;">—</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Charts -->
      <div class="chart-grid">
        <div class="chart-box full">
          <div class="chart-title"><i class="fa-solid fa-ranking-star" style="color:var(--primary);margin-right:6px;"></i>各組最終加權分（排名順序）</div>
          <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title"><i class="fa-solid fa-chart-simple" style="color:var(--primary);margin-right:6px;"></i>評分分布（所有最終分）</div>
          <canvas id="histChart"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title"><i class="fa-solid fa-user-group" style="color:var(--primary);margin-right:6px;"></i>三位評審加權分比較</div>
          <canvas id="judgeChart"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title"><i class="fa-solid fa-spider" style="color:var(--primary);margin-right:6px;"></i>均分四大面向</div>
          <canvas id="radarChart"></canvas>
        </div>
        <div class="chart-box full">
          <div class="chart-title"><i class="fa-solid fa-layer-group" style="color:var(--primary);margin-right:6px;"></i>各面向均分分組比較</div>
          <canvas id="criteriaChart"></canvas>
        </div>
      </div>

      <!-- Per-judge heatmap -->
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-table-cells"></i>評分熱力圖（各評審各面向）</div>
        <div class="heatmap">
          <table class="hm-table">
            <thead>
              <tr>
                <th class="lh">組別</th>
                <th v-for="j in ['A','B','C']" :key="j" colspan="4"
                    :style="j==='A'?'color:#4f46e5':j==='B'?'color:#15803d':'color:#b45309'">
                  {{ judges[j==='A'?0:j==='B'?1:2] }}
                </th>
                <th colspan="4" style="color:var(--text);">均分</th>
              </tr>
              <tr>
                <th class="lh"></th>
                <template v-for="_ in 4">
                  <th>選題</th><th>病理</th><th>視覺</th><th>整體</th>
                </template>
              </tr>
            </thead>
            <tbody>
              <tr v-for="g in ranked" :key="g.zodiac">
                <td style="font-weight:700;white-space:nowrap;">{{ g.zodiac }}</td>
                <template v-for="judge in ['A','B','C']">
                  <td v-for="k in ['content','design','creativity','total']" :key="judge+k"
                      :style="g[judge][k]>0 ? hmStyle(g[judge][k]) : ''"
                      :class="g[judge][k]===0?'hm-0':''">
                    {{ g[judge][k]||'—' }}
                  </td>
                </template>
                <td v-for="k in ['content','design','creativity','total']" :key="'avg'+k"
                    :style="g.avg[k]>0 ? hmStyle(g.avg[k]) : ''"
                    :class="g.avg[k]===0?'hm-0':''">
                  {{ g.avg[k]||'—' }}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Outlier summary -->
      <div class="sec">
        <div class="sec-title"><i class="fa-solid fa-triangle-exclamation" style="color:var(--accent-l);"></i>
          離群偵測（單一評審偏離其他兩位 &gt; {{ OUTLIER_THRESHOLD }} 分）
        </div>
        <div v-if="flaggedGroups.length===0" style="color:var(--ok);font-size:13px;font-weight:600;">
          <i class="fa-solid fa-circle-check"></i> 無離群 — 所有評審對所有組別的加權分差距均在 {{ OUTLIER_THRESHOLD }} 分以內
        </div>
        <table v-else>
          <thead>
            <tr>
              <th>組別</th>
              <th class="r">評審A</th>
              <th class="r">評審B</th>
              <th class="r">評審C</th>
              <th class="r">離群評審</th>
              <th class="r">偏離量</th>
              <th>解讀建議</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="o in flaggedGroups" :key="o.zodiac" style="background:var(--accent-soft);">
              <td style="font-weight:700;">{{ o.zodiac }}</td>
              <td class="r" :style="o.judge==='A'?'color:var(--danger);font-weight:800;':'color:var(--primary);'">
                {{ o.ws.A>0 ? o.ws.A.toFixed(2) : '—' }}
              </td>
              <td class="r" :style="o.judge==='B'?'color:var(--danger);font-weight:800;':'color:var(--ok);'">
                {{ o.ws.B>0 ? o.ws.B.toFixed(2) : '—' }}
              </td>
              <td class="r" :style="o.judge==='C'?'color:var(--danger);font-weight:800;':'color:var(--accent-l);'">
                {{ o.ws.C>0 ? o.ws.C.toFixed(2) : '—' }}
              </td>
              <td class="r">
                <span class="outlier-badge">{{ o.judge || '兩評審' }}</span>
              </td>
              <td class="r" style="font-weight:800;color:var(--danger);">{{ o.diff }}</td>
              <td style="font-size:12px;color:var(--text2);">
                <span v-if="o.judge">
                  評審{{ o.judge }} 與其他兩位均分差 {{ o.diff }} 分 →
                  <strong>建議確認評審{{ o.judge }} 對此組的評分依據</strong>；
                  若有合理說明則保留，否則考慮以另外兩位均值替代
                </span>
                <span v-else>兩位評審分歧 &gt; {{ OUTLIER_THRESHOLD }} 分 → 建議討論後確認</span>
              </td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:12px;font-size:11px;color:var(--muted);">
          方法：對每組每位評審計算其加權分與另外兩位均值之差，差值 &gt; {{ OUTLIER_THRESHOLD }} 且為三人中最大者標記為離群。
          僅加權分（50% 面向 + 50% 整體印象）納入比較，非原始各面向分數。
        </div>
      </div>

    </template>
    </div><!-- end judge tab -->

    <!-- ═══ VOTES TAB ═══ -->
    <div v-show="tab==='votes'">

      <!-- Session input -->
      <div class="vote-session-form">
        <i class="fa-solid fa-database" style="color:var(--primary);"></i>
        <span style="font-size:13px;font-weight:700;color:var(--text2);">Firebase Session ID</span>
        <input v-model="voteSessionInput" placeholder="例：20260611-9X9Y" @keyup.enter="() => connectVoteSession()">
        <button @click="() => connectVoteSession()">
          <i class="fa-solid fa-plug"></i> 連接
        </button>
        <span v-if="voteState==='ready'" style="font-size:12px;color:var(--ok);font-weight:700;">
          <i class="fa-solid fa-circle" style="font-size:7px;"></i> 即時連接中 · {{ totalVoters }} 票
        </span>
      </div>

      <div v-if="voteState==='idle'" class="loading" style="padding:40px 20px;">
        <i class="fa-solid fa-square-poll-vertical" style="animation:none;opacity:.3;"></i>
        <p>輸入 Session ID 後載入學生票選資料</p>
      </div>
      <div v-else-if="voteState==='loading'" class="loading" style="padding:40px 20px;">
        <i class="fa-solid fa-circle-notch"></i><p>連接 Firebase…</p>
      </div>
      <div v-else-if="voteState==='error'" class="loading" style="padding:40px 20px;color:var(--danger);">
        <i class="fa-solid fa-triangle-exclamation" style="animation:none;"></i>
        <p>連接失敗，請確認 Session ID 及網路</p>
      </div>

      <template v-else-if="voteState==='ready'">

        <!-- Vote stat cards -->
        <div class="stat-row">
          <div class="stat">
            <div class="lbl">投票人數</div>
            <div class="val" style="color:var(--primary);">{{ totalVoters }}</div>
          </div>
          <div class="stat">
            <div class="lbl">學生第一名</div>
            <div class="val" style="color:var(--gold);">{{ voteRanked[0]?.zodiac }}</div>
          </div>
          <div class="stat">
            <div class="lbl">評審第一名</div>
            <div class="val" style="color:var(--primary);">{{ ranked[0]?.zodiac }}</div>
          </div>
          <div class="stat">
            <div class="lbl">排名 Spearman ρ</div>
            <div class="val" :style="spearmanRho>=0.7?'color:var(--ok)':spearmanRho>=0.4?'color:var(--accent-l)':'color:var(--danger)'">
              {{ spearmanRho }}
            </div>
          </div>
          <div class="stat">
            <div class="lbl">排名完全一致</div>
            <div class="val" style="color:var(--ok);">{{ exactMatchCount }}</div>
          </div>
          <div class="stat">
            <div class="lbl">差距 ≥ 3 名</div>

// ── Spearman rank correlation ─────────────────────────────────────────────
function spearman(xs, ys) {
  const n = xs.length;
  if (n < 2) return 0;
  const d2 = xs.reduce((s,x,i) => s + (x - ys[i])**2, 0);
  return +(1 - 6*d2 / (n*(n**2-1))).toFixed(2);
}

// ── Stats helpers ─────────────────────────────────────────────────────────
function mean(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function std(arr)  {
  const m = mean(arr);
  return arr.length < 2 ? 0 : Math.sqrt(arr.reduce((s,x)=>s+(x-m)**2,0)/(arr.length-1));
}
function pearson(xs, ys) {
  const mx=mean(xs), my=mean(ys), n=xs.length;
  const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
  const den=Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0)*ys.reduce((s,y)=>s+(y-my)**2,0));
  return den===0 ? 0 : num/den;
}
function quantile(sorted, p) {
  const i=(sorted.length-1)*p, lo=Math.floor(i), hi=Math.ceil(i);
  return +(sorted[lo]+(sorted[hi]-sorted[lo])*(i-lo)).toFixed(2);
}
function fmt2(n) { return isNaN(n)?'—':n.toFixed(2); }

// ── ML utilities ──────────────────────────────────────────────────────────
function zScore(X) {
  const n=X.length, p=X[0].length;
  const mu=Array(p).fill(0).map((_,j)=>X.reduce((s,r)=>s+r[j],0)/n);
  const sg=Array(p).fill(0).map((_,j)=>{
    const m=mu[j];return Math.sqrt(X.reduce((s,r)=>s+(r[j]-m)**2,0)/n)||1;
  });
  return {Xs:X.map(r=>r.map((v,j)=>(v-mu[j])/sg[j])), mu, sg};
}

function pcaTop2(Xs) {
  const n=Xs.length, p=Xs[0].length;
  const mv=(M,v)=>M.map(r=>r.reduce((s,x,j)=>s+x*v[j],0));
  const dot=(a,b)=>a.reduce((s,x,i)=>s+x*b[i],0);
  // Cov matrix (p×p)
  const C=Array(p).fill(0).map((_,i)=>Array(p).fill(0).map((_,j)=>
    Xs.reduce((s,r)=>s+r[i]*r[j],0)/(n-1)));
  function powerIter(M,iters=300){
    let v=Array(p).fill(0).map(()=>Math.random()*2-1);
    for(let t=0;t<iters;t++){const w=mv(M,v),nm=Math.sqrt(dot(w,w));v=w.map(x=>x/nm);}
    return v;
  }
  const pc1=powerIter(C);
  const lam1=dot(pc1,mv(C,pc1));
  const C2=C.map((r,i)=>r.map((v,j)=>v-lam1*pc1[i]*pc1[j]));
  const pc2=powerIter(C2);
  const lam2=dot(pc2,mv(C2,pc2));
  const tv=Array(p).fill(0).map((_,i)=>C[i][i]).reduce((a,b)=>a+b,0);
  return {
    proj:Xs.map(r=>[dot(r,pc1),dot(r,pc2)]),
    var1:+(lam1/tv*100).toFixed(1), var2:+(lam2/tv*100).toFixed(1)
  };
}

function kmeans3(Xs) {
  const n=Xs.length, p=Xs[0].length, k=3;
  // spread init across sorted PC1
  const idx=[...Array(n).keys()].sort((a,b)=>Xs[a][0]-Xs[b][0]);
  const step=Math.floor(n/k);
  let cen=Array(k).fill(0).map((_,ci)=>[...Xs[idx[ci*step]]]);
  let asgn=new Array(n).fill(0);
  for(let it=0;it<100;it++){
    const prev=[...asgn];
    asgn=Xs.map(d=>{
      let best=0,bd=Infinity;
      cen.forEach((c,ci)=>{const d2=c.reduce((s,x,j)=>s+(x-d[j])**2,0);if(d2<bd){bd=d2;best=ci;}});
      return best;
    });
    cen.forEach((c,ci)=>{
      const pts=Xs.filter((_,i)=>asgn[i]===ci);
      if(!pts.length)return;
      c.forEach((_,j)=>{c[j]=pts.reduce((s,r)=>s+r[j],0)/pts.length;});
    });
    if(asgn.every((a,i)=>a===prev[i]))break;
  }
  const inertia=Xs.reduce((s,d,i)=>s+cen[asgn[i]].reduce((t,x,j)=>t+(x-d[j])**2,0),0);
  return {assign:asgn, inertia:+inertia.toFixed(2)};
}

function olsBeta(X, y) {
  // Standardized OLS coefficients + R²
  const n=X.length, p=X[0].length;
  const {Xs}=zScore(X);
  const my=y.reduce((a,b)=>a+b,0)/n;
  const sy=Math.sqrt(y.reduce((s,v)=>s+(v-my)**2,0)/n)||1;
  const ys=y.map(v=>(v-my)/sy);
  const XtX=Array(p).fill(0).map(()=>Array(p).fill(0));
  const Xty=Array(p).fill(0);
  for(let i=0;i<n;i++){
    for(let j=0;j<p;j++){for(let kk=0;kk<p;kk++) XtX[j][kk]+=Xs[i][j]*Xs[i][kk];}
    for(let j=0;j<p;j++) Xty[j]+=Xs[i][j]*ys[i];
  }
  const A=XtX.map((r,i)=>[...r,Xty[i]]);
  for(let col=0;col<p;col++){
    let mx=col;
    for(let r=col+1;r<p;r++) if(Math.abs(A[r][col])>Math.abs(A[mx][col])) mx=r;
    [A[col],A[mx]]=[A[mx],A[col]];
    for(let r=col+1;r<p;r++){const f=A[r][col]/A[col][col];for(let kk=col;kk<=p;kk++) A[r][kk]-=f*A[col][kk];}
  }
  const beta=Array(p).fill(0);
  for(let i=p-1;i>=0;i--){beta[i]=A[i][p];for(let j=i+1;j<p;j++) beta[i]-=A[i][j]*beta[j];beta[i]/=A[i][i];}
  const yhat=Xs.map(r=>r.reduce((s,x,j)=>s+x*beta[j],0));
  const ss_res=ys.reduce((s,v,i)=>s+(v-yhat[i])**2,0);
  const r2=+(1-ss_res/ys.reduce((s,v)=>s+v*v,0)).toFixed(3);
  return {beta:beta.map(b=>+b.toFixed(3)), r2};
}

      let mx=0, grp='';
      ranked.value.forEach(g=>{
        const ws=[judgeWeighted(g,'A'),judgeWeighted(g,'B'),judgeWeighted(g,'C')].filter(x=>x>0);
        if(ws.length<2) return;
        const d=Math.max(...ws)-Math.min(...ws);
        if(d>mx){mx=d;grp=g.zodiac;}
      });
      return fmt2(mx);
    });
    const maxJudgeDiffGroup = computed(()=>{
      let mx=0, grp='—';
      ranked.value.forEach(g=>{
        const ws=[judgeWeighted(g,'A'),judgeWeighted(g,'B'),judgeWeighted(g,'C')].filter(x=>x>0);
        if(ws.length<2) return;
        const d=Math.max(...ws)-Math.min(...ws);
        if(d>mx){mx=d;grp=g.zodiac;}
      });
      return grp;
    });

    const criteriaAvgs = computed(()=>{
      const gs=ranked.value;
      return CRITERIA_KEYS.map((k,i)=>({
        label:CRITERIA_LABELS[i], avg:fmt2(mean(gs.map(g=>g.avg[k]).filter(x=>x>0)))
      }));
    });
    const topCriteria    = computed(()=>{ const a=[...criteriaAvgs.value].sort((x,y)=>parseFloat(y.avg)-parseFloat(x.avg)); return a[0]?`${a[0].label} (${a[0].avg})`:'—'; });
    const bottomCriteria = computed(()=>{ const a=[...criteriaAvgs.value].sort((x,y)=>parseFloat(x.avg)-parseFloat(y.avg)); return a[0]?`${a[0].label} (${a[0].avg})`:'—'; });
    const criteriaRange  = computed(()=>{
      const avgs=criteriaAvgs.value.map(c=>parseFloat(c.avg)).filter(x=>!isNaN(x));
      return avgs.length ? fmt2(Math.max(...avgs)-Math.min(...avgs)) : '—';
    });
    const corrDimTotal = computed(()=>{
      const gs=ranked.value.filter(g=>g.avg.total>0);
      const dims=gs.map(g=>(g.avg.content+g.avg.design+g.avg.creativity)/3);
      const tots=gs.map(g=>g.avg.total);
      return dims.length ? fmt2(pearson(dims,tots)) : '—';
    });

    // ── ML: PCA + K-means + OLS ──────────────────────────────────────────
    const mlResults = computed(() => {
      const gs=ranked.value.filter(g=>g.final>0);
      if (gs.length<4) return null;
      const X=gs.map(g=>[g.avg.content,g.avg.design,g.avg.creativity,g.avg.total]);
      const {Xs}=zScore(X);
      const {proj,var1,var2}=pcaTop2(Xs);
      const {assign,inertia}=kmeans3(Xs);
      let regResult=null;
      if (voteState.value==='ready') {
        const vpts=gs.map(g=>voteTotals.value[g.zodiac]?.points||0);
        if (vpts.some(v=>v>0)) regResult=olsBeta(X,vpts);
      }
      return {gs,proj,var1,var2,assign,inertia,regResult};
    });

    // Correlation matrix: content, design, creativity, total, final
    const corrMatHeaders = ['選題','病理','視覺','整體','加權分'];
    const corrMatrix = computed(() => {
      const gs=ranked.value.filter(g=>g.final>0);
      if (!gs.length) return [];
      const cols=[
        gs.map(g=>g.avg.content), gs.map(g=>g.avg.design),
        gs.map(g=>g.avg.creativity), gs.map(g=>g.avg.total), gs.map(g=>g.final)
      ];
      return cols.map(a=>cols.map(b=>fmt2(pearson(a,b))));
    });

    const hmStyleCorr = (v) => {
      const t=(parseFloat(v)+1)/2; // map -1..1 to 0..1
      const r=Math.round(220-t*140), g2=Math.round(80+t*120), b=Math.round(80+t*20);
      return `background:rgba(${r},${g2},${b},${0.15+0.55*Math.abs(parseFloat(v))});color:${Math.abs(parseFloat(v))>0.6?'#fff':'#18181b'}`;
    };

    // ── Vote analytics ───────────────────────────────────────────────────
    const ZODIAC_ORDER = ['子鼠','丑牛','寅虎','卯兔','辰龍','巳蛇','午馬','未羊','申猴','酉雞','戌狗','亥豬'];

    const voteTotals = computed(() => {
      const pts = {};
      ZODIAC_ORDER.forEach(z => { pts[z]={points:0,r1:0,r2:0,r3:0}; });
      Object.values(voteRaw.value).forEach(v => {
        if (v.rank1 && pts[v.rank1]!==undefined) { pts[v.rank1].points+=3; pts[v.rank1].r1++; }
        if (v.rank2 && pts[v.rank2]!==undefined) { pts[v.rank2].points+=2; pts[v.rank2].r2++; }
        if (v.rank3 && pts[v.rank3]!==undefined) { pts[v.rank3].points+=1; pts[v.rank3].r3++; }
      });
      // assign student rank
      const entries = Object.entries(pts).sort(([,a],[,b])=>b.points-a.points);
      entries.forEach(([z,],i) => { pts[z].rank=i+1; });
      return pts;
    });

    const voteRanked = computed(() =>
      ZODIAC_ORDER.map(z=>({zodiac:z,...voteTotals.value[z]})).sort((a,b)=>a.rank-b.rank)
    );
    const totalVoters = computed(() => Object.keys(voteRaw.value).length);

    const comparisonRows = computed(() => {
      if (!raw.value.length) return [];
      return ZODIAC_ORDER.map(z => {
        const g   = raw.value.find(x=>x.zodiac===z) || {};
        const vt  = voteTotals.value[z] || {points:0,rank:99};
        return {
          zodiac: z, element: g.element||'',
          final: g.final||0, judgeRank: g.rank||99,
          votePoints: vt.points, voteRank: vt.rank,
          rankDiff: vt.rank - (g.rank||0),
        };
      }).filter(r=>r.final>0 || r.votePoints>0);
    });

    const spearmanRho = computed(() => {
      const rows = comparisonRows.value.filter(r=>r.judgeRank>0 && r.voteRank<99);
      if (rows.length < 3) return '—';
      return spearman(rows.map(r=>r.judgeRank), rows.map(r=>r.voteRank));
    });

    const exactMatchCount = computed(() => comparisonRows.value.filter(r=>r.rankDiff===0).length);
    const bigDiffCount    = computed(() => comparisonRows.value.filter(r=>Math.abs(r.rankDiff)>=3).length);
    const bigDiffGroups   = computed(() => comparisonRows.value.filter(r=>Math.abs(r.rankDiff)>=3).sort((a,b)=>Math.abs(b.rankDiff)-Math.abs(a.rankDiff)));


    const selfVoteCount = computed(() => {
      let c=0;
      Object.values(voteRaw.value).forEach(v => {
        if (!v.voterZodiac) return;
        if (v.rank1===v.voterZodiac||v.rank2===v.voterZodiac||v.rank3===v.voterZodiac) c++;
      });
      return c;
    });
    const selfVotePct = computed(() => {
      if (!totalVoters.value) return 0;
      return +(selfVoteCount.value/totalVoters.value*100).toFixed(1);
    });
    const topVoteConcentration = computed(() => {
      const sorted=[...voteRanked.value].slice(0,3);
      const topPts=sorted.reduce((s,g)=>s+g.r1,0);
      return totalVoters.value ? +(topPts/totalVoters.value*100).toFixed(1) : 0;
    });

    // ── Outlier detection ────────────────────────────────────────────────
    // For each group: compare every judge to mean of the other two.
    // Flag if deviation > OUTLIER_THRESHOLD. With 3 judges this is more
    // robust than median (median = middle value, middle can never be outlier).
    const OUTLIER_THRESHOLD = 1.0;

    const outliers = computed(() => {
      return ranked.value.map(g => {
        const ws = { A: judgeWeighted(g,'A'), B: judgeWeighted(g,'B'), C: judgeWeighted(g,'C') };
        const active = Object.entries(ws).filter(([,v]) => v > 0);
        if (active.length < 2) return { zodiac:g.zodiac, judge:null, diff:0, ws };

        let outlierJudge=null, maxDiff=0;
        if (active.length === 3) {
          ['A','B','C'].forEach(j => {
            const others = ['A','B','C'].filter(x=>x!==j).map(x=>ws[x]);
            const diff = Math.abs(ws[j] - mean(others));
            if (diff > OUTLIER_THRESHOLD && diff > maxDiff) { maxDiff=diff; outlierJudge=j; }
          });
        } else {
          // 2 judges only — just record the diff
          const diff = Math.abs(active[0][1] - active[1][1]);
          if (diff > OUTLIER_THRESHOLD) maxDiff = diff;
        }
        return { zodiac:g.zodiac, judge:outlierJudge, diff:+(maxDiff.toFixed(2)), ws };
      });
    });

    const outlierMap = computed(() => {
      const m = {};
      outliers.value.forEach(o => { m[o.zodiac] = o; });
      return m;
    });

    const flaggedGroups = computed(() => outliers.value.filter(o => o.diff > 0));

    const hmStyle = (v) => {
      const t = (v-1)/4;
      const r=Math.round(79+t*(16-79)), g2=Math.round(70+t*(163-70)), b=Math.round(229+t*(68-229));
      return `background:rgba(${r},${g2},${b},${0.15+0.5*t});color:${t>0.55?'#fff':'#18181b'}`;
    };

    // ── Charts ───────────────────────────────────────────────────────────
    let charts = {};
    const destroyCharts = () => Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});

    const buildCharts = (data) => {
      destroyCharts();
      const sorted = [...data].sort((a,b)=>a.rank-b.rank);
      const labels = sorted.map(g=>g.zodiac);
      const colors = sorted.map(g=>ELEM_COLORS[g.element]||'#6366f1');

      // 1. Bar — final scores
      charts.bar = new Chart(document.getElementById('barChart'), {
        type:'bar',
        data:{ labels, datasets:[{
          label:'最終加權分', data:sorted.map(g=>g.final),
          backgroundColor:colors.map(c=>c+'cc'), borderColor:colors, borderWidth:2,
          borderRadius:6
        }]},
        options:{ plugins:{legend:{display:false}}, scales:{y:{min:0,max:5,ticks:{stepSize:0.5}}},
                  responsive:true, maintainAspectRatio:true }
      });

      // 2. Histogram of finals
      const bins=[0,0,0,0,0]; // [1-2, 2-3, 3-4, 4-4.5, 4.5-5]
      sorted.forEach(g=>{ const f=g.final; if(f<2)bins[0]++;else if(f<3)bins[1]++;else if(f<4)bins[2]++;else if(f<4.5)bins[3]++;else bins[4]++; });
      charts.hist = new Chart(document.getElementById('histChart'), {
        type:'bar',
        data:{ labels:['1–2','2–3','3–4','4–4.5','4.5–5'],
               datasets:[{ label:'組數', data:bins, backgroundColor:'#4f46e580',
                           borderColor:'#4f46e5', borderWidth:2, borderRadius:5 }]},
        options:{ plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},
                  responsive:true, maintainAspectRatio:true }
      });

      // 3. Judge comparison grouped bar
      const judgeData = ['A','B','C'].map((j,i)=>({
        label: judges.value[i]||('評審'+j),
        data: sorted.map(g=>judgeWeighted(g,j)||null),
        backgroundColor: JUDGE_COLORS[i]+'99', borderColor: JUDGE_COLORS[i], borderWidth:2, borderRadius:4
      }));
      charts.judge = new Chart(document.getElementById('judgeChart'), {
        type:'bar', data:{ labels, datasets:judgeData },
        options:{ plugins:{legend:{position:'top'}}, scales:{y:{min:0,max:5}},
                  responsive:true, maintainAspectRatio:true }
      });

      // 4. Radar — avg of all groups per criteria
      const avgVals = CRITERIA_KEYS.map(k=>parseFloat(fmt2(mean(sorted.map(g=>g.avg[k]).filter(x=>x>0)))));
      charts.radar = new Chart(document.getElementById('radarChart'), {
        type:'radar',
        data:{ labels:CRITERIA_LABELS, datasets:[{
          label:'全體均分', data:avgVals,
          backgroundColor:'rgba(79,70,229,.15)', borderColor:'#4f46e5',
          pointBackgroundColor:'#4f46e5', borderWidth:2
        }]},
        options:{ scales:{r:{min:0,max:5,ticks:{stepSize:1}}},
                  plugins:{legend:{display:false}}, responsive:true, maintainAspectRatio:true }
      });

      // 5. Criteria grouped bar (all groups × 4 criteria)
      const criteriaDatasets = CRITERIA_KEYS.map((k,i)=>({
        label: CRITERIA_LABELS[i],
        data: sorted.map(g=>g.avg[k]||null),
        backgroundColor: ['#4f46e599','#16a34a99','#d9770699','#dc262699'][i],
        borderColor:     ['#4f46e5','#16a34a','#d97706','#dc2626'][i],
        borderWidth:2, borderRadius:3
      }));
      charts.criteria = new Chart(document.getElementById('criteriaChart'), {
        type:'bar', data:{ labels, datasets:criteriaDatasets },
        options:{ plugins:{legend:{position:'top'}}, scales:{y:{min:0,max:5}},
                  responsive:true, maintainAspectRatio:true }
      });
    };

    // ── ML chart builder ─────────────────────────────────────────────────
    let mlCharts = {};
    const buildMLCharts = () => {
      Object.values(mlCharts).forEach(c=>{try{c.destroy();}catch(e){}});
      mlCharts={};
      const r=mlResults.value; if(!r) return;
      const {gs,proj,var1,var2,assign,regResult}=r;
      const CL=['#4f46e5','#16a34a','#d97706'];

      // PCA scatter, color by cluster
      mlCharts.pca=new Chart(document.getElementById('pcaChart'),{
        type:'scatter',
        data:{datasets:[{
          label:'組別',
          data:proj.map(([x,y],i)=>({x,y,label:gs[i].zodiac})),
          backgroundColor:assign.map(k=>CL[k]+'cc'),
          borderColor:assign.map(k=>CL[k]),
          pointRadius:10,pointHoverRadius:13
        }]},
        plugins:[pointLabelPlugin],
        options:{
          plugins:{legend:{display:false},
            tooltip:{callbacks:{label:ctx=>`${ctx.raw.label}　(${ctx.raw.x.toFixed(2)}, ${ctx.raw.y.toFixed(2)})`}}},
          scales:{
            x:{title:{display:true,text:`PC1 (${var1}% 變異)`},grid:{color:'#e4e4e7'}},
            y:{title:{display:true,text:`PC2 (${var2}% 變異)`},grid:{color:'#e4e4e7'}}
          },responsive:true,maintainAspectRatio:true
        }
      });

      // OLS bar
      if(regResult){
        const {beta,r2}=regResult;
        const bColors=beta.map(b=>b>=0?'#4f46e5aa':'#dc2626aa');
        mlCharts.reg=new Chart(document.getElementById('regChart'),{
          type:'bar',
          data:{
            labels:['選題需求','病生理深度','視覺表達','整體印象'],
            datasets:[{label:'β',data:beta,backgroundColor:bColors,
              borderColor:bColors.map(c=>c.slice(0,-2)),borderWidth:2,borderRadius:5}]
          },
          options:{indexAxis:'y',
            plugins:{legend:{display:false},
              title:{display:true,text:`OLS 標準化係數　R² = ${r2}`,font:{size:12},color:'#71717a'}},
            scales:{x:{title:{display:true,text:'β（標準化）'},grid:{color:'#e4e4e7'}}},
            responsive:true,maintainAspectRatio:true}
        });
      }
    };

    const openMLTab = () => {
      tab.value='ml';
      nextTick(()=>buildMLCharts());
    };

    const exportData = () => {
      const payload={
        meta:{session:voteSessionInput.value||'',
              exportedAt:new Date().toISOString(),judges:judges.value},
        groups:ranked.value.map(g=>({
          zodiac:g.zodiac,element:g.element,
          judgeA:g.A,judgeB:g.B,judgeC:g.C,
          avg:g.avg,final:g.final,rank:g.rank,
          studentVotePoints:voteTotals.value[g.zodiac]?.points??null
        }))
      };
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=`poster_scores_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    };

    let voteCharts = {};
    const buildVoteCharts = () => {
      Object.values(voteCharts).forEach(c=>{try{c.destroy();}catch(e){}});
      voteCharts = {};
      const rows = [...comparisonRows.value].sort((a,b)=>a.voteRank-b.voteRank);
      const labels = rows.map(r=>r.zodiac);

      // 1. Side-by-side comparison bar
      voteCharts.compare = new Chart(document.getElementById('compareChart'), {
        type:'bar',
        data:{ labels, datasets:[
          { label:'評審加權分(×20)', data:rows.map(r=>+(r.final*20).toFixed(1)),
            backgroundColor:'#4f46e580', borderColor:'#4f46e5', borderWidth:2, borderRadius:4 },
          { label:'學生票數', data:rows.map(r=>r.votePoints),
            backgroundColor:'#16a34a80', borderColor:'#16a34a', borderWidth:2, borderRadius:4 }
        ]},
        options:{ plugins:{legend:{position:'top'},
          tooltip:{callbacks:{label:ctx=>ctx.datasetIndex===0?`評審: ${(ctx.raw/20).toFixed(2)}`:ctx.label+' 票數: '+ctx.raw}}},
          scales:{y:{beginAtZero:true}}, responsive:true, maintainAspectRatio:true }
      });

      // 2. Scatter: judge score vs vote points
      const scatterData = rows.map(r=>({x:r.final, y:r.votePoints, label:r.zodiac}));
      voteCharts.scatter = new Chart(document.getElementById('scatterChart'), {
        type:'scatter',
        data:{ datasets:[{ label:'各組', data:scatterData,
          backgroundColor: rows.map(r=>ELEM_COLORS[r.element]||'#6366f1'),
          pointRadius:8, pointHoverRadius:10 }]},
        options:{
          plugins:{ legend:{display:false},
            tooltip:{callbacks:{label:ctx=>`${ctx.raw.label}：評審${ctx.raw.x.toFixed(2)} / 學生${ctx.raw.y}分`}}},
          scales:{
            x:{title:{display:true,text:'評審加權分'},min:0,max:5},
            y:{title:{display:true,text:'學生票數'},beginAtZero:true}
          }, responsive:true, maintainAspectRatio:true }
      });

      // 3. Vote bar only
      const vColors = rows.map(r=>ELEM_COLORS[r.element]||'#6366f1');
      voteCharts.vbar = new Chart(document.getElementById('voteBarChart'), {
        type:'bar',
        data:{ labels, datasets:[{
          label:'票數', data:rows.map(r=>r.votePoints),
          backgroundColor:vColors.map(c=>c+'bb'), borderColor:vColors, borderWidth:2, borderRadius:5
        }]},
        options:{ plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}},
                  responsive:true, maintainAspectRatio:true }
      });
    };

    onMounted(async ()=>{
      try {
        const res = await fetch(GAS_URL, {
          method:'POST', body:JSON.stringify({action:'getScores', secret:GAS_SECRET})
        });
        const json = await res.json();
        if (json.status!=='success') throw new Error(json.message||'GAS error');
        raw.value       = json.groups;
        judges.value    = json.judges;
        submitted.value = json.submitted;
        state.value     = 'ready';
        await nextTick();
        buildCharts(json.groups);
      } catch(e) { console.error(e); state.value='error'; }
    });

    return {
      tab, state, ranked, judges, submitted, submittedCount, judgeWeighted,
      maxFinal, minFinal, meanFinal, stdFinal, rangeFinal, iqrFinal,
      outlierMap, flaggedGroups, OUTLIER_THRESHOLD,
      // vote tab
      voteSessionInput, voteState, voteRanked, totalVoters,
      comparisonRows, spearmanRho, exactMatchCount, bigDiffCount,
      openVotesTab, connectVoteSession,
      // ml tab
      mlResults, corrMatrix, corrMatHeaders, hmStyleCorr,
      openMLTab, exportData,
      hmStyle,
    };
  }
}).mount('#app');
</script>
</body>
</html>
